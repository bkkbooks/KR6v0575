body:
  text: 發揚佛化以濟現世界之恐慌十四年十月在神戶歡迎會講同人等此次赴東亞佛教大會道經貴地承貴會招待之殷實深感謝同人此次以純粹佛教之資格赴東亞大會其宗旨即在與貴國之佛教同胞謀真實之親善揚我佛之真光而救世界之戰亂非惟瞻仰貴國之佳山佳水與夫莊嚴燦爛之廟宇而來所謂闡揚佛法真光以救現世界之戰亂者即覺得現世界之人類都處於極恐慌之狀態中而感受此境況最重者則惟歐洲各國其原因即為物質文明發達生活日高而天産物亦日以之減少又以歐戰影響而人民處境愈蹙年來吾東方人亦感此同等的不安者實為崇拜西人之物質文明而起適才鳥尾君謂日本佛教以西洋文化侵入而佛之古風漸墜蓋所謂西洋文化換言之即物質的文明為保存及發揚佛法之古風救濟現世界的恐慌此吾中日佛教徒應負之責吾更推原西洋文化即物質文明之理由蓋西人天性豫智自雄好勇鬥狠而養成此性者即學術與地理使然溯西洋學術發源希臘所謂梭柏亞之西方三傑為西方文化之重鎮索其思想皆偏於智勇缺乎仁慈故柏臘圖之理想國把人類分為三級曰哲學者勇力者工作者由此吾人可見其側重智與勇而忽乎仁與德也至東方人則重於仁德而智勇則次之故東方文化概言之曰智仁勇即為儒書之三達德儒之仁義與吾佛之大慈大悲等皆為東方文化之精神所繫而佛教之全體大用曰大菩提大慈悲大權巧大勤勇以覺慈為因本而勇猛勤行其種種善巧方便之菩薩事業則為有益之勇猛而非擾害之奮鬥佛法之貴在此而救今日西人之偏霸者亦在此西洋上古之時人口較現在減人智較現在低故社會尚堪安靜中古以北蠻侵入而人口以之增加更以繁殖之速地狹而人衆其時之能安寧實賴基督教自東方傳入高唱其平等博愛與以維持之力故西洋得過千多年之太平近世紀以來人智漸以進步科學逐漸發明粗淺的基督教頓呈不穩之狀文藝復興以後近代之西洋人漸由基督之沉醉中而醒加以長足的進步而登物質文明之極頂人類亦以之轉入極不安寧之劇變中而現世界各國惟歐化之馬首是瞻故如火如荼之歐化幾遍全球而全世界之競爭紛亂實西洋之文化有以使然蓋歐化之進步靡已世界之恐慌愈迫居今日而欲謀世界的安寧必先改革西人之文明而改變西洋文明非基督教所能為力故佛法實為救濟現世界混亂之良劑也現在西洋所充滿者曰科學而世界人所崇拜者亦為科學惟佛法之精密思想於科學實有過之無不及者故欲斥伏西洋文化又必先斥伏科學科學雖有種種差別然歸納於一句言之曰思想精密有條不紊而佛法之精密則駕乎其上也故斥伏科學必須佛學非耶回道等所能斥伏科學斥伏則好勇鬥狠之歐化亦必轉為大慈大悲之美德而世界和平可望實現現在有佛化之國實為東亞而能將以傳布世界者則惟中日兩國故能負傳布佛教之責任者即為吾兩國之佛徒同人此次不遠千里而來其惟一之目的即在作中日兩國實行攜手而圖傳布佛教之真光於歐美以謀世界之和平滿智記見海刊六卷十二期附注原題在神戶歡迎會之講演辭今改題
