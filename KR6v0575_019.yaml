body:
  text: 心地十二年正月在荊州佛教會講荊州是歷史上有名的地方太虛此次因到宜昌沙市承此地佛教會諸君歡迎與此地有緣才能與大家說法起信論云依眾生心而說一切世出世間法維摩經云無法可說是名說法法因眾生心有故宜依眾生心說眾生心譬如地大地大之中含藏了一切動植山川的種子在地面才有一切動植山川的形狀故惟眾生心乃能總攝一切世出世間法古今所有滄桑陵谷的變遷都在大地之上四時之有春有夏草木之或榮或謝亦都在大地之上猶之眾生為聖為凡為智為愚皆不離乎一心所以佛法謂之心地法門眾生心為一切世出世間法所依止譬如大地為一切山川草木之所依止所以佛說一切法即是說明眾生心不講大地茫茫但就荊州說古今來不知經過多少變遷成敗眾生心也是一樣不必說普遍法界眾生心經過多少輪迴流轉即就個人言從無始來也不知經過多少輪迴流轉現在的荊州在春秋時為楚國的郢都到了明朝遼王開藩於此歷代以來視為重鎮然經過一番戰爭之後必呈一種荒涼景象荊州這個地方從春秋至今不知經過多少成敗變化也如我們現在這個人類有貧富貴賤苦樂境遇不同的皆是從無始來或為天或為人或為修羅畜生或為地獄餓鬼不知經過許多輪轉而來皆在此心地之上與荊州的變化一樣既能明白心地就要發明心地心量本是盡十方徧虛空包三世的無論天堂地獄及過去現在未來或南北東西總不離此一心能夠發明此心才能了達世出世間一切法門所以華嚴經云偏觀法界性一切惟心造此心不是一人獨有的不是眾人共同的不是佛才有而凡夫沒有的不是人之外另有的原為自性本有遍十方包三世的既知遍十方就知不僅限於人界而止既知通三世即知過去也是此心未來也是此心不過雖是一心但輪迴六道不能保其為人耳就如荊州地方雖說古今不變但不知為荒涼為繁盛經過許多變化以至今日耳眾生既不離心有心就能造業既造種種業以為因都要隨業受報業有善有惡所以結果就有樂有苦善惡因既由心造苦樂果亦不離心所以在佛法上說要發明心地能發明心地自己就可作得主宰不受他所支配了欲為聖則聖欲升天則天欲成佛則佛欲作祖則祖這種種因全憑一心所造如能明心見性自己即可作主惟心所造的業所受的果雖有種種不同實則此心內外如一古今不變既知此心不變所以成了佛也是此心眾生與佛同此一心依佛法修證皆可成佛未明此心的人既為眼前境界所障蔽就不知此境界如何發生了譬如這個荊州地方古今盛衰變遷原不離乎此地我們只為眼前的境界所障蔽就不知以前的種種境界了未明此心的人不知心量廣大長遠只知在眼前的根身器界中討生活於是為種種自業所支配遂受輪轉生死之苦可見我們不可不發明此心否則不知心之廣大就迷惑此心造一切業受種種報若明白人人都有這古今不變內外如一的心又知造善業得樂果造惡業得苦果苦樂因果皆由此心而造學佛與不學佛即可由此取決佛就是大覺悟者所謂覺悟就是覺悟這向來迷著的心因為此心一覺就有不覺對不覺言就名之為佛所謂一切法有因緣法有果報法因有清淨因染污因果有苦果樂果十法界都是由心所造明白此理就要明此廣大長遠的心發此廣大長遠的願不為現前境界束縛障礙憑此菩提心用以自覺覺他使人人皆可成佛學佛不過平平實實發明此心並不是甚麼祕密巧怪法門譬如荊州地方無論想造成如何繁盛只要憑此地人工以種種適宜方法皆可成就此心亦然如能發廣大長遠心不為眼前境界障蔽便可以證菩提果要證菩提果在根本上應將上來所講的道理看得明明白白將自己的心認得清清楚楚那就眼前境界皆此廣大長遠的心中所顯現不至為所障蔽了然講到不為眼前境界所障蔽也不是教人一切眼前的事都不去做不過應行正業止一切惡行一切善立廣大長遠的志願既能發廣大長遠的志願就不為眼前境界所障蔽去造惡業受此輪迴可以自己作主久而久之心中以前的惡業就可以空未來的惡業就可以止自然能成清淨安樂的業因久之即可成佛證果了荊州自民國以來遭種種變故不免荒涼大家不要為這荒涼景象所阻如能發心往繁盛去做將來自然可以恢復原狀的就如人能不貪眼前境界本此廣大長遠心以求無上菩提久之自可成佛太虛此次來很辜負眾位的屬望但很有所希望於眾位從地方上講人人發心把荊州恢復到昔日的繁盛原狀就心地上講人人本此光明圓滿的心個個成佛這就是太虛所希望了李笑雲記見海刊四卷六期附註原題在荊州佛教會講演今改題
