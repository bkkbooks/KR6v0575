body:
  text: 對治中國人通病的佛法佛如一個大醫生能善知一切的方藥遍醫一切的病症又如一個醫劑師能採集一切的藥材配成一切的藥品佛法如一部大醫書種種的病理醫方無不載明又如一爿大藥鋪種種的藥材藥品無不備蓄但醫藥之需要乃因疾病以生起在醫者雖必完具全備始足以供病者之所求而病者則但知病之何在當用何藥以醫治之可也處今之世居此之國諸君乃發心以求佛法殆皆菩薩發心欲診知國人病之何在而以佛法醫治之耳太虛於佛法既鮮修證之效於國人尤少診驗之功亦姑貢其所知以就正諸君而已竊國人第一大病乃在混沌此徵之代表中國人最高心理之所謂太極所謂自然者可知也孔氏書之太極既係指陰陽未分明時之混沌氣象而老氏書之自然亦惟窈冥恍惚之是稱因此中國人於一切心境皆以不解解不了了之混沌恍惚為第一義諦循是以學佛遂喜附會無為無分別等名句為玄妙而不一證其實際殊不知佛法之無分別乃無分別之智非無分別之混沌乃由觀察研究思考審擇分析判別之極透徹過心境之對礙一切法自體洞然明白了了顯現不假擬議謂之無分別智實係無法不徹底分明了別豈可以混沌恍惚當之哉此根本之病不袪故無論遇何宗教遇何政治都孌成東牽西扯牛鬼蛇神之怪象而佛法於中國除極少數專深者之外亦僅發生一種糅合中國舊謬思想之罪業報福迷信於真正佛法概不起何種關係也今欲治中國人之通病非先破除此根本的混沌心理不可其對治之道則在實證必一切事事物物非從根本上親討得一個盡量的徹底真實證明斷不容輕易放過以讓他混沌恍惚過去則宗教政治等亂象庶有澄清之望不然者經世利群出世修道胥永墮在漫漫黑霧冥冥長夜中將無一而可也中國人第二通病乃在僥幸此由根本的心理混沌恍惚之故不究其所以然之本因但著其當然之結果迷為自然昧由天命於是祗問運氣之如何不論行業之如何常乘機取巧以貪便宜祈福禳禍以工趨避但冀不為而得不作而獲以圖一旦之僥幸欲對治此病則在明因若能破除混沌心理而得個真實證明則正因果之理了然自見必須深察乎長遠微奧之因果有森然秩然不可侵犯之大法而見決無便宜可貪與趨避可工庶能不驚浮僞由敦朴力行以求達所達之地否則但望收穫而不事耕耘終無幸得也中國人第三通病乃在懶惰既專望僥幸而獲則懶惰乃勢所必至種種取名弋利之法殆無一實事求是精益求精者諸業廢弛百工枯窳惟以坐享遊食端拱無事為高貴皆懶惰之徵也現今世界諸國民無有能及中國人之懶惰者欲對治此病則須修佛法之精進行然若能確知正因果之理當不期然而自能精進矣中國人第四通病乃在怯懦懶惰沿習不惟於德能無所增進必將損其本能本德而怯懦成性亦屬勢所必至欲對治此病須修佛法之勇猛行但若能精進勤行則怯懦之習不難自除矣中國人第五通病乃在頑傲由混沌僥幸懶惰而至於怯懦成性縱有勝善亦不能勤勇求益改造創作則勢必至於頑劣媕陋而對於其餘之優越者強以色厲內荏之虛驕傲氣臨之此皆中國人之老病根佛法來中國數千年所以不能沾實益者亦由乎此當修佛法之慚愧行以對治之但混沌僥幸懶惰怯懦之病去則此頑傲之病亦自除矣中國人第六通病乃在昏亂此為近二三十年來新發生之病以為強有力之外勢所侵壓非復色厲內荏之虛驕傲氣所能鎮臨既失其藉以自固之圉而以混沌僥幸懶惰怯懦頑陋之頭腦大受外來強有力潮流之打擊其安能不頭昏眼花手忙腳亂乎於是昏不知辨亂起行動此實為中國人二三十年來之惡現象欲去此病當醫之以佛法之慧定由昏而亂亦須由慧而定必須以大慧照破一切環境而不為搖惑乃能泰然安定擇善而行成真正之進化而治本之法仍從破除混沌心理做起也中國人第七通病乃在厭倦此由昏眩中亂碰亂撞亂取亂捨亂迎亂拒之既久如白雲蒼狗一般刻刻變換不可執捉徙奮勤勞空無實效入世求冶不勝煩惱之困出世學道又為邪見所誤於是吃吃困困遊遊蕩蕩一切厭倦毫無遠志此當修佛法之深遠心以對治之所謂甚深心廣大心長遠心堅久心處處存深憂遠慮之心而進求常安永善之道庶可挽救也然此非先事由慧而定之定慧不為功中國人第八通病乃在貪狠此由厭倦所生反果蓋人皆厭倦無復深心遠志一部分流於頽喪一部分激變為貪狠只圖目前之快意以遂財色權榮之欲不管如何害民害國害家害友甚至不顧體面不恤名譽皆能下得狠心以為之此以近三四年來為最甚非發平等大慈同體大悲之心不足以救矣然若能稍存深意遠志貪狠之焰自戢層溯其本必先治混沌之病乃可欲對治上述中國人之通病擇之大乘各宗之佛法淨密偏重他力求趁現成不能對治其病天台華嚴亦好為流宕玄渺之說易附混沌三論破除分別亦分別既極以後之事今正須向無疑處起疑有疑處斷疑為徹底之研究故惟宗門之參究與唯識之剖證為宜但宗門之辦法僅二三特性之人有效非可行之衆人者若行之衆人則又轉落虛豁故祇有佛法之唯識學為能起中國人沉痾而愈之也唯識前挽阿含俱舍諸部後攬瑜伽華嚴諸部而總持大成者則在於成唯識論必相輔以行者則為因明入正理論此之二書統世上所有學說今尚為第一無比之勝義也若中國人高小或中學學生皆能熟讀此二書而了其精義則中國人之病庶其有治乎見海刊二卷十一期
