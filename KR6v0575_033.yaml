body:
  text: 在留滬日僑歡送會答詞十四年十月在上海日本俱樂部講中日兩國佛教徒與各地佛教徒國雖有別佛教是同一由教理上立言一佛法教藏發原於釋迦在菩提場之大覺中日佛教理無二致二由歷史上推論日本佛教傳自吾國近五十年來日本佛教同胞忙於對付維新後之摧殘中國僧尼每固執封蔽以自豪今者日本之難既除中國之封蔽已開中日佛教同袍應相砥礪去歲承貴國同袍之光臨今秋又蒙大會之盛招以同人之不學無術實有負諸君厚望然而謀中日之親善者即所以發揚佛化而救世界而佛化實有謀中日親善及救世界之可能吾人此行就教貴國以求推行佛教於世界之方針冀與貴國佛教徒同負宏揚佛教於世界之責任滿智記見海刊六卷十二期
