body:
  text: 佛教之因果觀十一年四月在黃陂前川中學講佛法者明白事理之方法也宇宙萬有不外事理二門而欲明此事理須用一種方法然事者指實事言理指真理言吾人必先明真理然後所作方為實事而免於虛偽錯誤凡一件實事之發動成就不外乎因果律其發動之種種方面即因是也由此各方面所湊合結集而成就發現為一種事實即果是也如宇宙間之山河大地飛潛動植乃至細微到於一微塵一芥子皆是果相此果必有因由故吾人可據果以推因如現前之講台亦一衆因所成之果故須有能作木工之人利用木工之器具規矩繩墨等而擇取適於作桌子之木料依此衆因而成就桌子之果因果之相同時俱生如木為因然已具有可以作桌子之功能故在因地時即含有果相逮已作成桌子時而此桌子乃木桌並非金鐵泥石等桌由此可知在果已成時因相仍在故因果之相雖可分而是同時俱有也穀種入地乃可為結成榖子果之因然必其地非是石田又須水力滋潤日光照臨人工培養然後至秋季乃能結實此土壤水力日光人工等即為之緣至新榖之果乃榖種之親因與土壤等衆緣和合而成故吾人從果上可以推因復在因上便可以測果所謂種瓜得瓜種豆得豆未有瓜種生豆豆種生瓜者因種起作用後中經多相其體量形狀均與原來因相不同雖不同而其最後結果仍與原來因相相同此在佛法上謂之異時因果如春種榖子中間經過發芽成稻開花種種至秋後始結果常人不能徹底明白因果如種榖後未見即刻結果而但見發芽開花等相遂以為因未必有果或以為果未必從因來因果可互為因果如舊榖種可結新榖子而此新榖子又可作明春之舊榖種是世人多欲明白因果然外學等如科學哲學因其推測之方法有錯謬或稍有發現自起執著故於因果律不能徹底明白既於因果未透徹故所發現之事實復成虛偽錯誤吾人若能徹底明白因果之真理遂可選擇良好之因而成就一良好之結果避去不良之因而免不良之果故根本上欲知因果真理遂有研究佛法之必要佛法能説明世出世間萬法之本體現象及其因果一切世間學術宗教亦皆稍明因果然以説不究竟遂生錯誤惟佛法能徹底説明神造世界迷物質自然真果體迷人生悟惑業真果體婆羅門耶回等謂世界與人生由於神造如謂為大梵或大自在天或上帝等所造成者如居城者不知稼穡之狀態及經過遂認米榖為米店之人工所造成此乃欲求真理而於真理未明創為臆説科學家反對前説謂世界人生皆由各種物質和合變化而成及至各物質解散其體遂歸於斷滅或仍化為氣體如人於收穫新榖時見此新榖由稻稈花葉等緣所成而不知此花葉等乃由最初之舊榖種而發生可謂知緣知果而不知因自然哲學家謂世界與人生乃是自然之現象殊不知若係自然則世界與人生不待因緣和合便應成就此乃於因果真理不明而又顢頇不加推求佛法謂世界與人生皆由吾人一心之不覺而發為迷惑由迷惑而發動行業故可知世界人生乃由惑業而有非是神造非是自然亦非僅以物質和合變化而成吾人現前一念之心本具智慧光明神通妙用祇因一念不覺而起惑造業遂現自身他人山河大地等等現象此如人於醒覺時本無夢境而睡熟後夢象宛然夢中亦有內身外物山河大地而夢夢相續惝恍迷離故世界成住壞空相續人生生長老死相續不得解脫不能出離欲求解脫出離還須明了本心令其念念常覺不昧乃可此如吾人欲求不作夢須能常時醒覺令其不睡始得一心之本體原是靈知不昧而又有可覺可迷之妙用由迷悟不同故所現境相不同十法界中由地獄以至菩薩皆一心所變現此如各人作夢之心不同故各人之夢境不同也因果為一心所造而萬法不出因果律故吾人若能知此心能造因果自加取捨擇別乃能斷惑止業而避免苦果此明實事若論真理此真理即吾人一心之本性此本性本來圓滿周遍德相具足祇以迷昧不覺其妙用遂不顯現儻吾人先由信解實事之因果依教起行漸至明心見性了知真理確實證明即是成佛之境界故佛者即大夢已覺而不復入夢境之人也王淨元記見海刊三卷十一期附注出前川聽法紀聞之二原文無題
