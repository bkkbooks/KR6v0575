body:
  text: 應病與藥之佛法十二年正月在宜昌佛教會講凡事欲窮究竟必明本源眾生法然佛法亦然欲明佛法之為何當從源頭溯起即是佛因何事而生世佛法因何事而建立明斯二者即識佛法源流自能融會事理不生牴牾原夫諸法實相本無可說因真如自性人人本有個個不無在聖不增在凡不減所謂離一切相即一切法尚無有佛何況有法然而我佛住世說法四十九年權說實說橫說豎說頓說漸說傳來此土者不過如大海水之一滴尚有三藏十二部數千卷之多則又何故耶蓋佛之一字即是覺義法之一字是軌持義佛法即是覺之軌持以覺法覺眾生者曰佛不覺覺法者曰眾生覺與不覺義相對待眾生與佛義相對待故佛為眾生而出世佛法因眾生法而建立法華經云諸佛為一大事因緣出現於世為令眾生開佛知見示佛知見悟佛知見入佛知見以一切佛法開示悟入一切眾生使一切眾生開示悟入一切佛法佛法源頭即在於此佛法究竟亦在於此今以譬喻明之眾生如病者佛如健全人亦如醫師佛法如醫方亦如醫藥因眾生有種種病故佛有種種法病者得藥疾痼方除佛法如處方故佛說有三藏十二部經世無無病服藥之理故真如自性不可以言說分別無說而說蓋由此也眾生因無明而有無明即病廣說為八萬四千塵勞略說有一百八種煩惱今約為二類一者凡夫病二者外道病夫依業果報而有眾生法界是業報有二種一者正報即諸眾生等各各感受此身皆由先世所作善惡等業因由此身正受其報故名正報二者依報即世界國土及器用等具諸眾生等入各各隨其果報之身依此而得住持故名依報凡夫人等虛妄執著此依業果報之身於中強立主宰或計為我或計我所貪求馳逐造業無窮蓋由始計身為我身我見既立則必求種種資生之具一眾生如是各眾生皆如是二貪相逐競爭斯起貪求不得或得不滿願必起瞋恚貪瞋二根依止癡住癡即無明一切煩惱之本根也凡此種種欲為之本欲有五種一曰財即財產欲如貪求田宅貨利等二曰色即男女等欲三曰食即嘗味等欲四曰名即聲譽等欲五曰睡眠欲即昧略為業令心闇劣者凡此五欲悉隨癡起原無自立諸眾生等無明夢中不覺本性乃有種種貪求不知五陰之身虛妄不實猶如水上浮漚水因氣而聚沫人依業而受身發業潤生無有窮際從流溯源以著我故所謂凡夫病者概約如此二外道病者其見較之凡夫稍進一步亦知五陰之身難可久住欲求涅槃解脫惟欲寶愛其身與凡夫病同但求住持之道則逈然大異然而不出二類一者欲即五陰之中擇色心質素而控御變化之以為永住之基妄計必無失壞即是涅槃解脫為神仙家修煉精氣神等是即其類二者於五陰外妄計有造物主主持一切在一切世間之上故能不受世間生滅若以彼為依一至彼處便脫輪回是涅槃果是解脫道如婆羅門計有大自在天及大梵天等求生彼天及基督教求登天堂皆是其類斯二種道雖較勝凡夫以佛法判之仍不出虛妄執著何以言之六欲四禪四空等天歷劫住世各有短長然壽命終有窮極如非想非非想處天壽命八萬四千劫可謂至長然經此劫已復歸生滅不過短中稍長暫中稍久耳故不出三界因果不出五趣升沉無一真實我佛世尊為對治諸眾生等種種病故立四聖諦一者苦諦總則六道生死別則二十五有生死夢中不識蘊處界法虛妄執著既依業報之身而著我不知是身即為眾苦之本饑渴寒熱瞋恚驚怖憂悲老死逼迫身心無所寧息審諦蘊處界法似有身相名假施設實不可得是為苦諦二者集諦審諦此身皆是過去無量世等煩惱業招集所致之苦報而現在煩惱業復為集起當來苦果之因是為集諦三者滅諦即是涅槃勝果審諦無為無起諸法能證涅槃寂滅之理五鈍五利諸煩惱結皆擇令永寂不起是為滅諦四者道諦正知正慧通理無礙審諦由此道故能得勝果為諸有情勤求解脫若三十七品四十心位等是為道諦苦果集因是世間因果滅果道因是出世間因果知苦斷集慕滅修道是為佛法觀四諦境修四諦智是為學佛以上略述佛法源流至修菩提之行法門無量即以言說分別非匆卒所能盡而是中念佛一門即持阿彌陀佛名號求生極樂之法最為簡而易行普被三根上則法身大士下逮十惡凡夫一念回心十念相續便階聖境雖有九品次第同屬圓證圓修真簡中之至簡亦圓中之至圓法海無涯惟求果腹志菩提者應勤斯學王邕記見見海潮音四卷六期附註原題在宜昌佛教會演說詞今改題
