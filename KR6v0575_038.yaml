body:
  text: 讚揚法華之特勝十四年十一月在東京日蓮宗立正大學講今日得到日本最特出之日蓮宗的貴大學來演説極為歡喜釋尊於法華會上始將出世現身説法之本懷盡量披露而三世十方如來轉法輪度衆生之真意亦皆曉然大白未到法華之前或大或小或頓或漸或偏或圓或權或實雖不無大頓圓實之教然終有與小漸偏權隔礙之形勢一經法華開顯乃知小漸偏權皆是如來不思議方便對聲聞弟子云汝等所行是菩薩道皆當成佛而聞者亦無不承當之者於是乎無復大小頓漸偏圓權實之隔一言一文一行一事皆為如來度生之妙法亦皆為衆生成佛之妙法然此猶為法華之通意其尤超特奇勝者更有開迹顯本之本門佛在迹門為文殊彌勒等尚可推測至於本門則純是佛之自住甚深法界逈絶思量擬議然應佛三輪之化與三乘聖衆五趣含識一切心行境路又誰不一一承此離思絶議之真實本而建設耶乃日蓮上人直從離思絶議之真實本握定為日蓮宗旨見衆生之本佛佛國土之本淨但須一聲大乘妙法蓮華經為增上緣以悟其本佛本淨之妙而已夫國治民安而獲人世康樂十善之行即足以致此然不達諸法實相則心易搖惑搖惑則不能安立於正而天下騷然矣故惟日蓮能從實際之真本立定正法正心而正天下貴大學秉日蓮上人立正安國之宗旨作育英才荷擔如來家業鄙人亦惟有隨諸君後宣揚不可思議之妙法蓮華使風雲擾攘荼毒生靈之全地球人類早皆契證於本地之法身淨土而已滿智記見海刊六卷十二期附注原題東京日蓮宗立正大學演説辭今改題
