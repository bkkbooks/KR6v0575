body:
  text: 在廈門日光岩講現今國內戰事甚為猛烈當此天氣寒冷負傷兵士及戰線內難民殷殷待救我等以慈悲為宗旨須從速組織救護隊前往戰線以拯救傷兵及一切難民齊姑可作看護婦出家人無家屬之纍犧牲冒險耐苦乃應盡之義務當實行菩薩救衆生之道方是佛教之真慈悲也若空談學理在寺岩中誦經拜懺安受坐享非真佛教之主旨請諸君注意見海刊七卷十一期附注本文自太虛法師蒞廈記録出
