body:
  text: 學佛應先解決三個問題十二年正月在沙市佛教會講太虛此次由彝陵經過沙市承佛會諸居士及地方各界人士邀約來會得與在座諸君聚處一堂研究佛法是非常欣幸的但講到學佛這件事先要研究欲研究先要解決三個問題一為甚麼要學佛二可以不學佛否三拿甚麼去學佛對於第一個問題所以要學佛的原因就是我們平常的要求平常有甚麼要求無非是要安安樂樂無非是要永久安安樂樂有此要求所以要學佛依佛法說無非為令世間解脫一切苦得究竟樂既要離一切苦得究竟樂所以就要學佛有一種人講離一切苦得究竟樂這種要求原來人人有的何必要學佛才能如此所以第二個問題就發生了對於第二個問題可以設為問答假如有人問我們為甚麼要學佛我答以非學佛不可照這樣說似乎武斷得很其實並非武斷就眼面前說比如有饑寒的苦惱得了衣食饑寒的苦惱離脫了就可以得安樂比如流離失所漂蕩無歸得有住所流離的苦惱離脫了就可以得安樂比如小孩子得成年人撫育也就可以離苦得樂照這樣說豈不都可以離苦得樂麼為甚麼要學佛為甚麼要提出這問題來研究他如饑寒時能得飽暖流離時能得住所凡衣食住人人所需用的有自人人供其所求又有國家保持社會現狀是種種方面都可以離苦得樂的又何必在佛法上求但是在世間上是不能完全離苦得究竟樂的比如饑寒之苦有食可以無饑有衣可以不寒然不過暫時離苦而苦根尚在且因謀衣食必起種種惑造種種業所以一切苦又隨之而起比如人生有情世間不止一人必有家庭有家庭要安居樂業便有負擔因負擔又生種種拘束種種煩惱稍得安樂苦又隨之而起所以不能離一切苦得究竟樂推而廣之不但家庭如此即社會亦然社會上可以互相維持以我所有通彼之無但是成了社會到了社會有益的地方種種煩惱亦隨之而生由是互相侵擾互相妨害互相併吞生出種種煩惱發生種種困苦所以不能離一切苦得究竟樂有種人說這是可以有救濟方法的只要有強富的國家良好的政府這苦就可以免這話也不甚錯因為有富強國家良好政府一國人民得以安居樂業自然是一種幸福但因這一點幸福而痛苦又生大凡一個地球上不止一國國與國相鄰必有交際因交際而生交涉因交涉而生戰爭因戰爭又發生種種痛苦種種義務可見有國家有政府亦不能離一切苦得究竟樂就上說概括一下我們人世上要求離一切苦得究竟樂實在無有辦法佛經上說以苦欲捨苦苦終不能出然人世上要求離一切苦得究竟樂原是正當要求但雖是正當要求一切辦法都做不到惟釋迦如來才說出種種法來令衆生離一切苦得究竟樂對於此種問題從前我已同人討論過有一位儒教老先生他說為甚麼要學佛我們讀聖賢書行豪傑事以揚名顯親為希望以齊家治國為事業照這樣可以不學佛了對於此種理由就人言人原不失為聖賢君子但是要求離一切苦得究竟樂仍是辦不到的這原因在何處如儒教所講的無非道學詞章考證三種這三種我細細把他推究起來便知道我的結果道學家所講的重要處不外民胞物與萬物一氣為天地立心為萬物立命但自佛學家看起來所講都是生生相續也是有苦惱的所以老子說天地不仁以萬物為芻狗暫時勉為救濟也無辦法易經六十四卦既濟之後繼以未濟可見暫時能濟終久不濟也是不能離一切苦得究竟樂所謂頂上的道學尚且如是講到詞章更不是了在中國古來詞章之高美莫過詩與離騷詩所以言性情國風之作多半男女淫詞雅頌之篇無非讚美帝王神武離騷美人香草滿紙皆是就此看來凡詞所流露者無非殺業淫業雖有所勸戒而根本業力未除要想離一切苦得究竟樂如何可能若夫考證所以研究經史因經史而知今古之所以興所以廢所以治所以亂未嘗與國民無益然欲求達到離苦得樂目的終不可能的所以發生離苦得樂之要求者以天地不完美故有種種苦惱要想把他離脫不惟儒家這三種做不到即現今世界哲學科學所研究的也是做不到所以要求離苦得樂非歸到這學佛範圍內不可試再進而批評道家有一位講究道家的先生說像我們學道的人以精氣神為三寶煉精成氣煉氣化神煉神歸虛也可離了這軀殼更升而為天上神仙長生不老豈不就可以離苦得樂嗎何必要學佛呢況且佛法修性不修命道家性命雙修依此看來可不學佛但是他說的方法不是無功的也不是無果的不過他的功用在精氣神上這樣精氣神如能保持得住未嘗無有好處無如到了功用一完仍然墮落何以故因為他捨卻一四大和合的假身又修成一五陰和合的報身較世人的生命雖然多活幾百年或幾千年或幾萬年豈知萬年一夕一夕萬年剎那剎那轉眼成空仍然是苦以未達離苦之究竟地故至於講到命字命是個甚麼東西本是虛妄的不實的一種業力的繼續離此業力之外無所謂命道家不過把他拿來擴充延長不知其為虛妄不實的以命是苦之根故佛法是解脫業力的所以能究竟常樂道家是延長業力所以不能究竟常樂依此說來道家既不能得究竟樂所以不得不學佛又世上的人也有信婆羅門教的基督教的回教的這三種教皆是一神教一神者所謂上帝是以上帝為唯一真神無論何物皆是他造的所以主宰萬物支配萬物他的用意無非說他是可以救衆生的這種教的理論是說世界何以有萬物何以生他是創造世界萬物的高出世界萬物之上的但使信他唯一真神朝夕禮拜虔心祈禱便可到永久安樂的地方他的用意無非如是但他講的唯一真神也要研究他一下到底是假設的是實有的假定為實有的他是從何處而來如說他唯一真神是自然有的世界萬物也可以自然而有為甚麼要他來造且造的萬物人是一種何以有智的愚的善的惡的富的貴的貧的賤的種種不公唯一真神至公至平何以所造的人有如是種種不平依此推究起來此唯一真神還是有的還是無的有無不能定便縹眇不實直同龜毛兔角徒有名詞而已可見依此而求究竟安樂還是不能的又有一種新學家說哲學可以發明真理科學可以發明實用依哲學與科學心思智巧利用自然因果一天進化一天文明也一天發達一天到了進化之極自有美滿結果可免困苦可享安樂但是這種學說也還要考究一番所言的進化是否依地球上人來講的地球在虛空為行星之一是有限量的地球之經成住壞空不知凡幾地球既有壞的時候即令進化不已如到地球壞了之時也與地球同壞依然落空與人生而又死有何區別可見科學哲學也無結果依上種種宗教種種學說討論也得其大略然欲求離一切苦得究竟樂的目的仍不可能大宗教大學說尚且如此其餘如某某門某某社以及一切旁門外道更不必問了所以非要學佛不可既是必要學佛所以第三問題又因之而起講到佛學原有次第其次第為何不外教理行證四種是依佛智慧所證得的真理而說出來的三藏十二部經典依教研究明白佛說的真理謂之理依理做去為之行行到功行圓滿的時候謂之證教理所講明的是說明一切人及一切衆生本來真心是圓明清淨的人人如此一切衆生莫不如此此圓明清淨心即是佛性諸佛與衆生無二無別禪宗有明心見性之說無非發明本心自見本性而已我們向來因無明不覺起惑造業造業固有苦惱有苦惱故不得安樂諸佛所說無非教人離一切苦得究竟樂其何以離何以得不外發明本性如要過細推求言之甚長好在沙市有佛教會會中諸人對於佛學很有研究佛經流通處所儲經典也不少儘可來此研究研究學佛不是專求佛理的是要依佛理去修才是究竟所以又在行字上再來一講有人到此地方必有疑問說衆生本來是佛本來清淨何必要學只為無始無明所以迷妄因迷妄所以顛倒因顛倒所以造業因造業所以流浪生死輪回六道受種種苦學佛是去迷妄顛倒的所以要實行如但明教理不加功用是不可的因不明佛性所以造業受苦能發明佛性了了顯現圓明寂照得大解脫大自在才能與佛一樣古德說佛是明悟之衆生衆生是未悟之佛便可以解決此疑問了然一推其無明所自來無始無始不知所自起以無明妄動故也曾為天也曾為人也曾墮入諸惡道也不知經過若干的世界成住壞空如要離一切苦得究竟樂用何種方法下手才能達到目的又不可不加以討論吾人何以迷妄由自心慳貪而迷妄也蓋慳貪是迷妄之根如要去迷妄須從破慳貪下手
