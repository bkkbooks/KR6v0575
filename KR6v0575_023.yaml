body:
  text: 黃梅在佛教史上之地位及此後地方人士之責任十二年七月在黃梅講一佛教之來由佛教出自印度起源於釋迦牟尼世尊在彼土或興或衰之年代及分宗裂派之淵源暫略而不宣我國佛教之起源自漢明金人入夢遂開彼般若之心胸滌彼無明之煩惱因是遣使西域迎佛像取佛經而佛教東渡自茲始矣佛教在中國派別雖有種種而黃梅在佛教史上之地位則專屬禪宗此宗傳自達磨以不立文字惟傳心印為宗旨來此土之年代在梁武帝時頃逮及初唐方達于禪宗完全隆盛之時代此與黃梅佛教有莫大之關係莫大之因緣考達磨在西天為二十八祖在東土為第一祖也達磨傳二祖慧可可傳三祖僧粲粲傳四祖道信信傳五祖宏忍忍傳六祖惠能此即一脈單傳之三十三祖也此六祖師資相傳之因緣有玄中之玄妙中之妙之真諦惟初祖至五祖其道猶未能大昌於世逮六祖受衣鉢而後始衣止不傳法被天下不獨緇流得法者多而儒生高足亦多有入於禪宗之室者此乃佛教一時之盛也考六祖受法之因緣東禪寺為傳法之場師到黃梅時一異鄉邊地之青年賣柴人耳爾時一談之下五祖即知其有大智慧堪傳大法令供職米頭苦行以深磨煉久因書偈壁間為衆驚歎五祖知傳法時至遂於夜半為其説法將衣鉢傳授之時五祖會中有一上座名曰神秀為大衆皈仰衆意傳五祖之法者必神秀而不圖五祖之竟傳于六祖也然使五祖無巨眼特識不潛授衣法于六祖從世俗之見而傳秀師則禪宗之風又豈能光被中國而流及高麗日本乎蓋中國自晚唐五代以來之佛教可謂完全是禪宗之佛教禪風之所播不惟遍及佛教之各宗且儒家宋明理學道家之性命雙修亦無不受禪宗之醞釀而成者故禪宗者中國唐宋以來道德文化之根源也而其樞要則在黃梅五祖之能毅然決然以傳能大師為六祖耳此可見黃梅佛教史地位之重要也二現在禪宗衰頽已達到極點茲欲重為振興當明五祖傳六祖之道為根本自民元迄今人民稍有回心向佛之思想但中國之佛教乃禪宗之佛教也非由禪宗入手不能奏改善世道之效故在不慧之意見起禪宗于既仆挽劫運于今時全賴黃梅僧俗諸公發無上菩提心重整五祖之規模大揚五祖之宗旨以之救全國全世界之人民于水深火熱之中實為諸君惟一責任覺慧記見海刊四卷八期附注本文從在黃梅講演之紀載中節出依當時講題改
