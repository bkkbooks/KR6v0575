body:
  text: 談臨濟四賓主十四年十一月在日本臨濟大學講赴東亞大會之同人大都為臨濟宗鄙人亦臨濟宗今日與諸君講演正是家裡人說家裡話太虛雖無臨濟老漢之手段然亦欲上追遺規下振群聾蓋佛法之真髓厥惟禪宗臨濟宗為禪宗正統正統之要今日且就四賓主略言之所謂主者唯是正智不思議法界也一賓中賓即在取虛妄我法相之五趣二乘地中於佛法不了解離言說之實相妄於名相求真換言之即以妄為真古德有云倚門傍戶心如醉出言吐語不慚惶二賓中主禪宗之旨即在離去名言而直下明心此為禪宗正義所謂賓中主即了解文字語言非佛法而真實之佛法則在離去名言真修實證古德有云口念彌陀雙拄杖目瞽瞳人不出頭三主中賓即是已證得離言不思議法界深契妙性亦即已得到祖位以利人故於無可言中而假立言說古德又云高提祖印垂方便利物應知語帶悲四主中主在教中謂為離言不思議法界維摩經中以無言說而顯不二法門如文殊問云如何是不二法門維摩詰默然無言文殊歎言是為真入不二法門古德又云橫按鏌邪全正令太平寰宇斬頑癡由是四賓主義以正之佛法不可在言說文字中求而利他故亦不離文字然第一要識得主中主偈云識得主中主佛無立足處一場閒葛籐付青山流水滿智記見海刊六卷十二期附註原題在臨濟大學講演辭今改題
