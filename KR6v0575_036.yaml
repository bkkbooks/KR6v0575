body:
  text: 應少女少年團之歡迎會答詞十四年十一月在日本東京講二十世紀為人智極進化之期又為道德極淪亡之時當諸君之青年時有如一年之春能有良好的培植將來即能得美滿的結果諸君于此幼年時間得受最高之佛化教育而為道德上之養成將來投身社會必能從佛教之道德的軌道上進行今日觀諸君之活潑精神即為將來佛法普被全球之預兆吾敢武斷二十年後的日本佛教必有更盛于今日者祝諸君長足進步前途福利滿智記見海刊六卷十二期
