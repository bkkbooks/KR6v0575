body:
  text: 傳教西洋之提議十四年十一月在日本京都大谷大學講今日承貴校之招來與諸君講演此是一件最難得之機會適承貴校長過於獎飾實深慚赧近代中國佛教雖有復興趨勢而私心猶以為如泉始流恆欲覓一普及佛法之道此次在上海未首途赴日之前自心中抱有兩種觀念其觀念的動機覺得近世紀世界之混亂皆為世人的盲目擾動若無最高無上之佛學為之指導則永無澄本清源之日此次參觀貴國社會使鄙人所抱兩種觀念皆認為滿意一中國佛教向來自蔽故佛法在中國雖已歷二千餘年而朝野上下人士能理會而深信者實寥若晨星鄙意即在如何使佛法普及使世界人能知佛法為人生之需故近年來對於宣傳佛法之事業努力為之而所辦之事業在貴國十年前已一一具足甚至淨土真宗一派所辦者亦應有盡有此實使鄙人最滿意而羨慕者此行既抱有以佛法感化世人之觀念到貴國後對此事極為注意今番由神戶而東京由東京而名古屋福井乃至京都社會之制度上人民之風俗上受佛法之影響最深切而信仰最濃厚者莫如京都而京都佛教徒所辦之社會事業最多而成績最有可觀者為淨土真宗之東本願寺而東本願寺對於社會事業之側重者尤在教育而教育機關之最有精神者則為貴大學故能使京都人民精神上受佛法影響最鉅者亦為貴大學今日參觀貴大學及京都社會人眾之於佛教關係能與鄙人謀佛法普及當從教育著手之一確證二普及佛法之後藉以引人入勝者厥惟像教鄙人七年前曾到貴國一次略瞻各處古物自心中常以為日本是收藏中國文化之寶藏近年來日本文化又轉而趨於西洋廓而充之可謂收藏世界文化之寶藏也此次赴日本之東亞大會即為瞻仰世界文化寶藏而來蓋貴國於各文化之能保存永久即由貴國天皇二千餘年之一統未斷此世界各國所無者又自聖德太子制憲而後政教協力使佛法得由政府護持而放大光明此亦東亞各佛教國所無貴國既有此兩種特點故能收藏世界文化以鄙人觀之日本之收藏世界文化有如佛法中所謂之阿賴耶識常相續而恆隨轉故於世界文化能收拾而寶藏之鄙人此次參觀所及如永平法隆東大等院寺所藏古物之多及貴大學所藏梵文巴利文英文藏文等書籍之富足以驚人又中國頻年新文化叢書之譯本多取自貴國近來西洋各國所有之英文佛書亦去自貴國由斯鄙人對於貴國佛教有兩種希望一日本能為佛教重鎮為世界文化之光明幢而貴國佛教各大學對於英文巴利文特為注意故能負傳布佛法於世界之責者亦為貴國而貴大學又以歐文最著將來日本向西洋宏法亦惟貴大學之馬首是瞻所謂大谷換言之即大口吞吐十方鎔世界為佛教之國二前謂世界混亂為世人之盲目擾動非最高佛學與以破斥難有澄本清源之日貴國為佛化新起之秀亦世界文化寶藏而貴大學又為淨土真宗所辦之最高學府將來不難以佛法真光化混亂的世界各國為彌陀依正莊嚴之淨土人能宏道願與諸君共勉之滿智記見海刊第六卷第十二期附註原題京都大谷大學講演詞今改題
