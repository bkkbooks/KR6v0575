body:
  text: 世界佛教聯合會開會講詞十二年七月在廬山世界佛教聯合會講今天是世界佛教聯合會成立之第一日亦即為開講佛學之第一日於此廬山牯嶺最清涼之所得與諸公濟濟一堂暢談妙諦亦實為難得之盛況大好之勝緣但常人以研究佛法實踐梵行專屬諸出家之和尚尼姑兩眾於在家之祇求耳聞未必心念貫通身體力行者遂置之不講而近今西洋文化盛傳時代又以為東方佛教是古舊的陳腐的民國十二年來學潮澎湃國人咸惕然興起始研究實學考求真理乃克知佛學為一簇嶄全新之救世大法不限於古代不局於東土尤不拘於出家之僧尼而確有遍及現代世界各國永久不替之可能性與現在世界上各色之人眾皆具有密切之關係焉約其要點言之擅文章者廣通內典可益見淹博閎肆修道學者全明佛理可更資策勵精進以故佛教中人欲普宣法化當參照基督傳佈之方式耶教中人欲精益求精亦當研究三藏十二部之玄理世間各類人等若能互相聯合以祈共進於至善方知大覺世尊為一大事因緣故出現於世所謂如理而證如證而說絕非東方古舊之陳腐而實可以通行世間宏濟群品之至道要術也蓋根本之義既經決定則世間一切善業與佛法不相背謬者均可於佛法中得有相當之利益若由之深造而自得又無一非得達彼岸之通塗者如是則安得不以一聞佛法為快哉矧廬山係中外人士暑期避暑之良所今茲適逢其會發生此世界佛教聯合會若得中西人士共資探討以為佛教傳佈世界之媒介何幸如之現分為十講以說明之俾見廬山真面目於佛化世界云程聖功記見海刊四卷八期附註從原題佛法略釋中別出為廬山講學之發端故今改題
