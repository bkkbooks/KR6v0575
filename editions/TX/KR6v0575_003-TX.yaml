body:
  text: 佛教兩大要素六年九月在台灣靈泉寺講集東西南北之人成法喜禪悅之會有大因緣良非等閒而不佞由海天萬里雲水百城今得與諸君晤談一室慶幸何如法華經云諸佛如來皆以一大事因緣故出現於世夫此一大事因緣物物具足誠能究盡其義則凡出現於世者皆有一大事因緣在也又云佛種從緣起古德則曰識得佛性義當觀時節因緣今既值善慧禪師提挈此大因緣網之宏網使諸君與不佞之心光重重交映於眉月靈泉之間能不相率一證佛法之大義而忍令虛擲此大好之時節因緣乎佛法大旨要唯真俗二諦以真諦故超出世間以俗諦故普度眾生二義同時而無前後二法一體而非對待在佛菩薩之行祇是一事故又曰唯一實諦所謂以大智故念念證覺以大悲故念念同塵大智大悲恆現一心是也順眾生機隨宜說法遂由一實諦演為五乘會歸其極不外令人人超出世間而普度眾生耳不超出世間則墮於凡夫法而非佛菩薩法不普度眾生則墮於小乘法而亦非佛菩薩法抑非超出世間則不能普度眾生非普度眾生則亦不能超出世間故梵天猶有邪見而小聖未免偏執也昔釋迦世尊示人修行佛法之榜樣壯歲出家獨入深山超世出世成最正覺菩提既證涅槃不住轉大法輪廣度眾生嗚呼盛矣大丈夫不當如是耶然所謂超出世間所謂普度眾生容易模糊影響流入岐途今應略顯其義令人無疑一超出世間義何謂世間文字語言法是世間依群眾起故由習俗成故古今變遷故國土離異故復次數量時方法是世間可推測故落邊際故假施設故非決定故復次和合法是世間無體性故趣離教故復次因果法是世間無根極故起追求故舉要言之五蘊七大八識十八界十二因緣二十五有等一切有為法以有生老病死故以有生住異滅故以有成住壞空故以有對治破除故皆世間法也然則吾人起心動念殆未有不落於世間法者果將如何而可超越出離乎世間耶此所當回光返照深參力究而不可草草放過者也即如金剛經云應無所住而生其心則欲發心修行不可不先將所謂無所住者悟得從外觀之人物依地輪住地輪依水氣輪住水氣輪依風輪住風輪依虛空住虛空無所依故無所住從內究之五蘊幻體從煩惱業緣生煩惱業緣從無明妄想生無明妄想從覺心轉動生而本覺真心無所從生故無所依住徹悟本心之無所依住淨除諸念猶如虛空虛空無依無住亦無虛空可為餘法依住亦無少法能依虛空而住則風輪亦以無所依故無所住風輪且無所住況水氣輪地輪人物之輾轉依風輪而住者乎由是一切諸法皆無所依住以無所依住故無住生心生心無住所謂一切法不生而般若生般若生而一切法不生也言至於此逗露不少然非親見本不生本無住真心者終是空談白話了無交涉二普度眾生義心佛眾生三無差別眾生即佛佛即眾生胎卵濕化之四生天人鬼畜之六趣無不皆具如來智慧功德之相直示真心普令成佛豈不痛快直捷無如眾生業力差別無量妄想執著種種不同非有無量不同之法門以應之不足成普度眾生之益故於未有出世善根之三惡眾生且令聞三皈名受五戒法近載人乘而度三惡遠作三乘出世之種又於未有出世善根之人道眾生令知佛法僧義而起正信教以十善法及世間禪定法近增福德而生天道遠亦作出世之因又於已種出世三乘善根之眾生亦隨宜成熟而度脫之所謂聲聞以四諦法緣覺以十二因緣法菩薩以六度萬行法是也我等今幸在人道欣聞佛法縱未能即成佛道亦當依佛法修行俾生生世世不失人身乃可隨力以進趣佛道宏揚佛法即超出世間普度眾生是也昔裴丞相序圓覺經曰諸天耽樂修羅方瞋禽獸懷狖獝之悲地獄有幽沉之苦可以端心慮趨菩提者惟人道為能耳端心慮趨菩提既入寶山勿空手回此則不佞與諸君共勉之者也出東瀛釆真錄附註覺書題作台灣基隆靈泉寺之說法今依自傳改題
