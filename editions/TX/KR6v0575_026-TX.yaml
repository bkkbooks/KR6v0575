body:
  text: 佛法要在起行十二年臘月在武昌佛學院講吾輩學佛應知三藏十二部一切言教皆是教人起行之方便若有雖解教理而不知起行者即是違背佛意不得謂之學佛至後分立宗派不過方便不同故吾昔在廣州講佛乘宗要曾將大乘各宗分為教門派理門派行門派果門派四種雖有教理行果之分而皆為起行之門惟其如是故佛教各宗如萬水朝宗于海皆當宏揚不可偏執一是然則今日學佛者第一在先發菩提心次則修菩薩行以菩提心而修菩薩行則不求證果而自證菩提之果故華嚴經說善財童子自蒙文殊開示南行處處參訪善知識皆曰我已先發阿耨多羅三藐三菩提心而未知菩薩云何行菩薩道修菩薩行惟願大德開示訓誨等夫菩薩行本無窮盡佛觀眾生根機曾開八萬四千法門亦欲眾生各隨樂欲信解起行以成妙果中國在唐時各宗興盛各趨行果唐後教下各宗漸衰惟達摩禪宗綿延不息近日佛法昌明教下各宗漸次恢復而密宗尤為絕而復續其于修行直依果法為門而起較顯教更為緊切所願已發菩提心者量自根機若修密教以趨行亦捷足先登之一殊勝方便也見海刊五卷一期附註本文自佛學院行散學禮並歡迎大勇阿闍黎及陳皮兩居士中節出
