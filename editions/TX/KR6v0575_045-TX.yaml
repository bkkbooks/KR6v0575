body:
  text: 自造十四年十二月在蘇州自造寺講上下數千年縱橫數萬里人民種族之龐雜學術思想之紛歧實不可一概而論故今抽繹講述數項于下以窺一斑一有一類知識活潑之人不甘枯槁沉悶于一生數十載光陰之下茫茫以生昧昧以死來不可待往不可追薾然役役受形待盡于是起要求的思想對人生形成之由來及宇宙萬有之緣起求其一個明白但因無研究的利器憑著意識測度錯覺模仿其結果于光影門頭遽下武斷謂人生由來宇宙緣起均是操于一有人格的大神為之主宰為之支配然此真宰的大神又超乎人類萬有之上焉但此等神話自遠古至近今經世事後先的遷變人智遞邅的發展其趨勢不得不隨其所應之潮流以更改其主張故有多神一神汎神等論其所主所說雖代代不同其有神之觀念一也此名為神造論二有一類世間學者不滿意神造論于是生種種的反響用科學分化方法搜歷史古物考證實驗推究人生之由來宇宙之緣起其結果于種種說明下一假定謂人生與宇宙均是物質組織成形如發現人身或由若干原質或由無數細胞之結合而人生則從下等動物進化來也其發現全宇宙的事物亦惟是同一方法故其說明一事一物的成壞必一個一個一段一段的剖析析至于不可析巧立一名或原質或原子或電子或愛或力等為形成宇宙萬有不同之要素雖時成時壞其要素不過時顯時潛自成一種物質不滅的觀念雖命名各各不同其唯物觀念一也此名為物造論三更有一類人雖亦作種種的研究解決宇宙萬物問題含有神造物造之彩色然不若前二者傾向于兩方各走極端如推求世界萬有未發生以前之本體如何有以空為本位從空無中漸漸化生世界萬有如云天地萬物生于有有生于無此為虛無造論有以元氣為本位從混沌元氣中有陰陽消長不息之變化于是逐漸形成世界萬有如一生二二生三三生萬物等此為太極造論綜合上各種推究的結果宇宙萬有如何發生如何造作莫不持之有故言之成理以佛法觀之彼所主之神造論物造論虛無造論太極造論無非夢中說夢而反自以為覺固哉其迷也然其顛倒迷妄之原因大概可分為二一不明真實法相義二不明真實因果義蓋彼亦曾推究到法相義因果義例如能創宇宙萬有之神為因所創宇宙萬有為果此為因果義又神者為宇宙萬有之實在恆常不變宇宙萬有者為神之現象變化不居此為法相義其所明因既非真因其所明果亦非實果因果既非真實則法相亦屬顛倒扼要言之因發明此等之鼻祖均是生死凡夫以無明迷惑心為動機發其千差萬別之思想造千差萬別之事業耳若夫大塊載之以形勞之以生佚之以老息之以死鼠肝虫臂龜毛兔角任造化之推移循宿業之發現者更無足論矣若以佛法言之無別造作者唯是自造何以故凡真能造作者與其所造作物總不離各自活潑靈明運動知覺之心發動種種因種種緣因緣和合則宇宙萬有從之創造其創造之原始即迷此真實法相義真實因果義莫知起始無所終窮因因果果遞邅無間通達佛法者即抉破此二種之迷明生即無生故迷此二種故就此活潑潑的心對逆順的境界發生種種惡念作出種種的惡業造成三惡道的依正二報若就此活潑潑的心趨向于正義道德上行所謂持五戒行十善修四禪入八定造成三善道的依正二報故此三界六道各個眾生依各自活潑靈明心而造作造何因得何果此之謂業報得此業報之業報總體名阿賴耶識亦名業識歸就於各個眾生或三惡道或三善道之各類範圍就此各類範圍內變身命外變器界故人生之由來宇宙之緣起各各是自己所造自造之身命住自造之世界自造之世界還載此自造人身命各就其各個眾生自識所造之善惡差別所得各個自類身命世界美醜壽夭淨穢不同能如此澈底了解人生宇宙識得如此為真因如此為實果則若因若果及貫通因果之法即是真實法相故要求明白此二種者不于外求就于現在剎那間靈明活潑心中求識得現在受者果即是過去因現在作者因即是未來果故此因果皆自造也造苦因得苦果奚怨奚尤造樂因得樂果何幸何欣乃知現在受苦果者亦可造樂因得未來之樂果現受樂果者若是造苦因亦可招未來之苦果善惡輪迴苦樂循環如春蠶作繭自纏自縛如夜蛾赴火自燋自爛誰是自癡甘醉此者人間世有真慧心者感此苦樂相仞相靡無窮極之宇宙欲求脫離即就此靈明活潑之心趨于善去于惡擴充移植以造圓滿善因減縮剷除以淨盡其惡因得證羅漢辟支佛菩薩佛陀之果位亡其分段乃至變易生死亦不外從此一念靈明活潑的心行去耳豈從外得豈事他求哉亦不過如握手成拳舒手成掌耳十法界迷悟染淨因果凡聖皆自心造華嚴經偈云應觀法界性一切惟心造故凡真能明白因果者亦必能明白法相能如此確實真信洞底了解即為宇宙之王于萬有之中得其自在從此之後凡所修持都憑自己決定其中間所經過歷程則與三乘往覺先賢如出一轍必無疑者但是眾生無始虛妄習氣非常之重茍能稟教修持念茲在茲或暫伏煩惱的現行智慧暫時開發貫通因果事相覺悟真實理性既而時過境遷無明又發智慧隱蔽不能得其真把握要得此真把握亦無他術宜研究經論或親近明眼高德對於佛祖真如等流的言教有發憤忘食樂道忘憂的境界淪骨浹髓純與真理融化一舉一動皆從個中流出此為有力之覺悟雖天下非之而不加沮天下譽之而不加勸所謂立定腳根八風吹不動也從此所起之思想無不純淨所發之言論無不中肯所作之事業無不適當對於向來種種謬誤根本淨除到於圓滿菩提歸無所得也然此行證固不無先後之異及達到目的地一也第一即持戒清淨止息諸惡調善身心不有持戒定無由入慧無由發故持戒為定慧之嚆矢菩提涅槃以戒為基礎其重要可知人能持戒如新浴之身得一種非常快愉高潔之人格也第二即禪定寂靜使內心精純不因外妄動而得安寧實因持戒之力遮身口七支之過得專志於內而獲鎮定縱使外物誘衒亦莫之奈何故人若能得定即精神作用和平統一如一國一土盜賊潛蹤不事干戈入其境者如登春台入禪定者一心寂靜輕安快樂有非局外人可知者然此定心對於煩惱惟伏而不能斷第三智慧圓明要將無始黑暗惡習煩惱以極明利之智慧斷除淨盡故戒定猶殺散盜賊社會表面雖現和平其隱憂方興未艾今此智慧如搗破盜窠使其無容身之處殺者殺投者投肅清一切再無鋒火之驚使完全成一郅治國家良善社會煩惱根蒂既斷除淨盡其靈明活潑的覺心清淨無疵則依此心所變現之色身與器界皆得其清淨圓成其本具佛性功德究竟佛果也總上所講依佛法根本成語即教理行果所謂依教明理依理起行依行證果故佛法雖浩瀚無涯此實為佛法大綱古今宏揚佛法大德立宗判教咸循此為起點為歷程為結歸此佛法所以是微妙圓通深不可識者也念佛法門亦然因聞如來如實之言教而得覺悟如此五濁惡世眾苦充滿之世界都由無始煩惱心所招感變現於是要求解脫此極苦世界求生彼極樂世界於是念念阿彌陀佛念念厭離娑婆念念欣生極樂故知求生西方依然憑此靈明活潑的心豈離心外念彌陀離心外生極樂實因此心可造彌陀可造極樂今既自造還自生之也換言之西方極樂世界亦由彌陀願力所造成故我們念佛求生彌陀與極樂不過為一種增上的勝緣切實言之我們將來所生到的極樂世界所見到的阿彌陀佛還是我們各個自心所造成耳凡是生到極樂世界的眾生同是一種清淨的心同造一種清淨國土凡是處在極苦世界的眾生同是一種惡濁心同造一種惡濁國土物以類聚共業所感誠非虛語故真實修淨業者能發清淨心修清淨行即將阿賴耶識所含藏善種子起善現行各各為因互互為緣惡種子惡現行滅盡善種子善現行充滿自造成一種純清淨的世界奚假他求哉上來惟講自造二字善體會者即可以通達諸法實相即可以明白宇宙萬有即可以明六道四生即可以明四聖依正在會諸公聞之者亦有動於中而興起修持乎雖然自之為自究何是自若云是心心復何在心之一名其實如何則又非窮參力究一番不為功願與諸君共勉之象賢記見海刊七卷五期附註原題在蘇州自造寺念佛社之講演今依太虛叢書哲學集改題
