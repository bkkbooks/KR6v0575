body:
  text: 欲求人類之真幸福須止惡修善十五年九月在福州會館講太虛此來頭一天即到貴會館共叨擾數天今日又承各位歡迎好似舊地重遊格外有一種深厚之意味而對於各位又不禁有一種很有情的心理講到佛法本無可說即有言說亦不過隨緣而說今因貴會館之福州兩字遂聯想到凡屬世界上之人類無非為求幸福而已講佛法亦在使人求得幸福並希望一州一省一國一世界均成為有幸福之州省國家世界人人均成為享幸福之人耳中國古來有一名詞曰神州佛稱此土曰南瞻部洲再大而言之稱曰四大部洲現今地理家分吾人所居之地球為五大洲可見國或世界同可以州名之我們為國民或世界人類造幸福均可謂之使國及世界成為有幸福之福州故福州實為世界人類之所共同希望和要求的而西洋有一派人生哲學家之主張求最大多數之最大幸福為人生目的亦本乎此意也但世人或為家庭或為社會或為世界以求幸福其目的大多相同不過求幸福之道往往不能深知而常因錯誤而發生許多苦痛如今日世界之列強為求己國己族之幸福而恆不顧他國他族之幸福壓迫之殘殺之毫無憐惜又如中國近年來之軍閥為達求私人野心上最大之幸福彼此殘殺迄無寧歲彼輩雖欲求幸福而結果反得其禍故吾人當明求幸福之正道依佛法講要求幸福並不從搶奪殘殺而來乃要人修善求福所以佛法最注重是要人止惡修善能照此四字作去世界自可太平無事蓋人類之根本要義是在保存其生命故保全生命是人心為善之根本唯須推己及人使世界人類均能互相保存生命凡屬損他人生命之事絕不去作如此在儒家謂之為仁心在佛家謂之為慈悲以有仁心和慈悲之人世界人類幸福始能成就諸位都是福州人可以說都是具有善根福德之人若將善根福德推之一省一國一世界必盡成有幸福之樂土矣現在諸位雖在海外經商而心目中必時時眷念祖國思將自己之智巧財力盡量以救濟但徒恃智巧財力以救中國恐不成功因真要救國救世必須先有一種根本之道德以求得人類有了共同相安之生存然後方有真正之幸福所以佛法要人止惡修善第一是使世人均知道宇宙含靈咸同佛性都與自己是如一的明乎此斷無有自己願意殺害自己者而相殺害之事乃可休止故佛法之三皈五戒中第一條即是不殺生如殺生則對於仁心有虧不能止惡須視眾生之苦樂若自己也苦樂如是則與佛說之慈悲相合矣平常許多人一見佛法很高深便作望洋興歎之感而不知佛法即是人生安穩之寄託處極切實而不空泛只須守持五戒中之不殺則人類立刻減少無限糾紛得到無限幸福欲救今日亂爭之世界唯在止殺而止殺之訓佛言最詳人但遵行便得利益如此看來佛法與人生並不疏闊而隨時隨地均有密切之關係故太虛與諸位最後申言佛法以戒殺為首慈悲為本此八字願諸位努力提倡則他日之世界必真成為共享和平幸福之福州矣寧達蘊記見海刊七卷十期
