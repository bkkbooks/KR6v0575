body:
  text: 宣講佛教對於人生之關係在武昌佛教宣講所講我今天到這宣講所與諸位接談很是歡喜因我前去武漢時就聽體空和尚說蕭督辦有創辦佛教宣講所之舉不料我此次來漢成立已久并聞各位均常常來此聽講而且共同念佛離開半年之久又加許多親信佛法與念佛之人佛教亦繼長增高世上風俗亦依之遷善此即如孔教所謂齊一變至於魯魯一變至於道之說但是佛教之教化其目在免吾人輪迴大苦吾人自無始不覺受六道輪迴之苦若造有善業則上昇造有惡業則下墮生生世世了無止期故生生世世受此輪迴之苦不能解脫非但生生世世有此輪迴即當一念亦有無量輪迴譬如吾人生起一念之善是即為天生起一念之惡是即為鬼為畜於一念中即忽然而天忽然而鬼忽然而畜而況晝夜六時不知其幾千萬萬之輪迴所以佛教的教化即是使人免去現在的輪迴與未來的輪迴吾人如欲免種種輪迴之苦則當先依佛教保全人道之法始儻吾人人道得以保全再進一步則可昇天再進一步則可超出三界由超出三界而至菩薩由菩薩而至成佛從一步一步之進化而證至不可思議究竟之佛位若捨此不圖別無良策也更進一層講佛教不是一方一隅獨得沾其恩澤亦非少數之僧伽與少數信仰人應獨受其教化是由這一個宣講所的教化法而推行於世界之上使世界之上人人得沾佛教的教化但此等責任并非是少數出家人與少數信仰人所能達得到的是全在聽講諸位以聽講之力量進而研究佛經再由研究佛經之力量去創立許多的佛教宣講所以教化全世界的人若論世界各種宗教皆可以教化世界的人為完全正當的人格奚必規規於佛教呢但欲明白為人的究竟道理惟佛教為能耳所以我們大家欲明白做一個究竟的正當人皆要從佛教上去研究一番欲研究佛教的道理現下非從宣講入門不可從前的出家人除念經禮懺而外并不知道宣講佛法教化世界今既有人提倡佛法宣講佛教的道理而聽講諸位亦宜發起勝心一方面將所聽的教化他人一力面將輪迴問題常常覺悟對於世界一切生慈悲心而慈悲之生起從何入手呢譬如吾人日常受用一切資身眾具皆從多人的力量而成故一人的生活亦須與世界上人相通無礙而後可若不生慈悲心則相爭相鬥不惟大家不能安樂即自己也不能安樂所以學佛法的人便是修學這個慈悲心此心具足則爭鬥殺傷不起大家得其安樂自己亦得其安樂若不受佛法的教化則慈悲心不能具足不安分之事相繼而起大家既不能安分守己各各皆逞其欲望以相凌奪而世界無片時之可安矣由這樣看來自己不能安分大家亦不能安分大家不能安樂自己亦不能安樂推其根本就在未受佛法發慈悲心的熏習之所致總望大家以生起慈悲心為本若慈悲心生則人身可以保持不致墜失人身既不墜失則此人身便是出世的正因為菩薩的正因為成佛的正因可見現下的慈悲心一經增進便是大菩提心進步又進步便到究竟佛果今日是就此佛教宣講所與諸位略講這個佛教對於人生的關係其他甚深之道非今日暫時所能講得到的待有機會再與諸位接談妙空記見海刊七卷三期附註原題在武昌佛教宣講所之演說今改題
