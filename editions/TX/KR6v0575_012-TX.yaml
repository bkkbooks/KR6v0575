body:
  text: 人生之苦迫及其解脫十一年四月在黃陂木蘭女學講吾人因何而講究佛法耶因吾人既已受得人身常遇困苦拂逆之境若欲解脫出離則有講求佛法之必要此不但講求佛法為然凡吾人所云為動作皆因解決現前困境而發動如飢求食寒求衣住求房屋等又因求食遂連帶求榖米而講農作烹飪等事人生之苦多矣自呱呱墮地後必有生活之能力乃能求得衣食住故幼年必須研究種種學問學習種種技藝又有老病衰弱等苦此屬於自身者也又天災水旱猛獸毒蛇瘟疫飢饉險巇坎坷等此種種苦惱屬於自然界者也人生不能單獨生活必賴群眾共相維繫乃能共同生活因此需要遂又發生種種盜賊戰禍制牽連累妒嫉毀辱爭奪謀害等等苦惱此屬於人為界者也嬰兒出胎即哭可見人生憂苦與生俱來此一聲之哭即表示其當時所感最為痛苦且似自知後此之苦方接踵而俱來者此為生苦童年時代種種生活皆不能完全自主故一般童子之心理多以為迨我成年便覺快樂及至成年則由壯而老遂又感受種種痛苦如六根漸壞身體衰弱不能享受人生圓滿之幸福此為老苦若壯年時四大輕安環境順適似足稱為樂矣乃忽焉疾病發生身體上感受種種痛苦而與老年童年時無異此為痛苦吾人有生必有死此死之一關為人人所不願到而又為人人所不能免及至大命將傾莫可奈何最後一棺附身萬事皆已面對此死魔終無術逃避此為死苦生老病死四苦固為人人所同具而不能免此外則恩愛者欲求其常聚乃事實之結果往往而有生離死別等事發生而演為愛別離苦又人所愛護之物而終久不能保持存在當其損壞亡失之時則對於所愛之物亦感受一種愛別離苦恩愛之反面為怨憎吾人對於所怨憎之人或厭棄之處所事物常不欲其聚會乃事實往往不然如冤家聚頭仇人見面等事此為怨憎會苦前說人生在世因欲維持其生命及發展其種種樂欲故有衣食住名譽光榮威勢權利等等要求人人如是向前馳求不能無衝突制限所以往往求而不得此求而不得之情事亦能使吾人感受苦惱是為求不得苦求不得之反面尚有所謂捨不得苦者如人因飢寒而求衣食儻有人知求食之苦由於飢餓而欲將此飢餓捨卻而卒不可捨推而至於生老病死等皆欲捨而不得是為捨不得苦總之吾人既落形氣之中頭出頭沒無往非苦總前八種痛苦觀之可知吾人之一生無時不沉淪苦海中故欲求出離解脫此各種苦惱而須研求佛法蓋純正之佛法乃可以指導吾人出脫苦海永得安樂之方法也何則前之諸苦非是天造地設亦非自然化生且非決不可出離乃由因緣聚合而成之果故欲免除苦果須依佛法上所說苦果之因緣而不再作此能感苦果之因緣則可免苦矣吾人若能確信萬法皆由自心所造萬法又不能超出因果律故從此一心自造善因則可不感惡果蓋前說種種苦痛乃由自心所造成非從外來仍可由自心改造而出脫也吾人靈明之心以向來未覺故而起貪瞋癡等惑復由此迷惑而起種種行業行業既起自然而感受苦果故欲免苦須先將此一心上所俱起之根本無明及三毒煩惱磨治盡淨方能斷惑止業則苦免矣此貪瞋癡之三毒不但能使吾人生時發生現行之惑業儻不磨治盡淨雖色身死滅而此心中之三毒仍能起惑造業而為苦果之因三毒既為眾苦之因欲免苦須斷三毒然則何法以對治三毒斷除三毒乎佛法一大藏教法門無量皆為演說戒定慧三德以治除貪瞋癡三毒即戒以治貪定以治瞋慧以治癡然戒定慧之理非一二言句所能宣說佛有方便法門即以念西方阿彌陀佛名號為方法念念相續勤行精進信願往生極樂世界此念佛之念頭即是戒定慧即能治除貪瞋癡若念到一心不亂乘願往生之時即是真正永久越出苦海之時也簡便易行願聽眾諦信之王淨元記見海刊三卷十一期附註出前川聽法紀聞之三原文無題今加
