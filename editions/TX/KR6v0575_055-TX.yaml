body:
  text: 楞伽大意十六年春在法苑楞伽祈禱會講法苑同人以世人昧於業果之理演成爭殺之事因體我佛慈悲之意發起上海祈禱息災會持誦大乘入楞伽經於每日下午三時請余演說楞伽大意余思此會為時既促而楞伽妙義重重無盡既不堪作具體之研究又未能為抽象之討論僅就余持誦時所感覺者約略言之相宗六經楞伽第一經談五法三自性明法相義八識二無我明唯識義相唯識之所變識為相之能變能變之識類別為三曰異熟思量及了別境識所變之相雖則無量賴耶所變者有漏雜染相名分別是彼諸識之所變緣正智真如唯諸佛自證聖智所緣行相非諸凡夫外道境界故純善無漏凡夫外道所變所緣皆煩惱有漏之法世出世間法漏無漏攝盡深密經云諸識所緣唯識所現蓋離識之外實無餘法故一切法唯識凡夫外道由不了達身外之境山河大地動植物等唯是內識之所變遂執能知之識以為我而計被知之境以為法因計我法為實有故起惑造業所以永淪生死苦海諸佛悲愍眾生故施設名句文身之教法使覺悟被知之境即能知之識所現知境唯識則不復貪戀迷惑而思自造善法以成就樂境也蓋識種有二一為有漏種一為無漏種有漏種所生之果皆雜染法隨順有漏而受生之有情其業重者則所領之境純苦無樂其造因輕者或苦樂參半然終不能究竟離苦而得樂故皆為惡果無漏種所生之果即諸佛之身土故為至樂而無苦吾人自無始以來法爾有漏恆現其本具之無漏種則隱伏於賴耶識中而從未現行也故修學佛法其功用即在引發無漏之現行而伏斷有漏之種子然現行之有漏法何以能斷滅未起之無漏法何以能發生能說明其斷滅與發生之理由者則佛菩薩所言關於唯識之經論也證以本經則其立名已隱含上述之二義蓋楞伽城為譬喻辭諸異生類為現行之煩惱所牽動所以拘礙於生死之中不能出離故佛以城喻生死縛然城所依者為海亦即喻變現眾生根身器界之集起心也此心為煩惱法與無漏善之所依止亦為聖凡產生之根本故借海以為喻以海有容納萬流之能似阿賴耶識能含藏一切諸法之種子遇緣而起諸法現行之大用故經云藏識海常住境界風所動楞伽城為夜叉王及其眷屬之所居住喻諸眾生無始時來即為煩惱有漏法所染污致無漏佛種隱埋不現所以生死相續往來於三界之中夜叉賦性殘忍常行殺害有情與煩惱相類故可為喻佛從龍王宮出乃至夜叉藉佛神力請佛說法而悟入一切法唯識所變之義意顯眾生本有之無漏佛種須藉佛說清淨無漏名句文身以為引發之緣綜觀上述則楞伽經所顯示者應有二義一為惡一為善眾生心在未聞佛法以前皆為煩惱惡法之所集聚逮佛出世得聞妙法則本有無漏善法為之引生而煩惱惡法逐漸以之消滅也今者大地騷然一球六洲宛然夜叉食肉之場而滬濱一隅尤為產生吾華萬惡之大本營其被禍將更甚於各地然諸仁者今既回心向善又得諸師持誦經咒之力或當因此而消滅也蓋眾生之業力雖不可思議而諸佛神變加持力亦復不可思議但專一持誦心無他緣為眾生回向自可於冥冥之中轉重為輕轉輕為無也佛為究竟圓滿清淨之果覺能以自證所得之神力使用於眾生八識中而現起等流之相如現代催眠術以能催眠者之心施於所催眠者兩心連續而和合發生不可思議之現象此凡夫之心兩人結合效力猶且如是今吾人持誦經咒即是以佛之大智大悲大定力而加持行者變濁土為極樂登凡愚於聖道亦指顧間事也但視行者之精誠何如耳楞伽言加持即攝密教微妙義密宗金剛藏菩薩由佛神力之加持而能說法蓋佛之神通不可限量不惟有情之凡夫可由加持力而說法即無情之草木宮殿皆可以佛之加持力而說法今諸仁者為滬上將罹戰禍建茲道場顯密雙修亦在藉眾人悔罪的同情心及十方三世諸佛之加被力而改變其將臨之禍而為福人或疑之余深信焉縱滬上人士未能一致的覺悟而將心懺悔不足以消此將成之業果但每日在座之淨業行者以自誦經咒力聽聞佛說力則多聞熏習如理作意而增長佛種頓現淨土殆無可置疑矣唐大定記見海刊八卷三期附註原題楞伽祈禱會演講紀要今改題
