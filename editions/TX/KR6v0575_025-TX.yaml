body:
  text: 覺悟真我與往生極樂十二年九月在漢陽水警廳講佛法不在遠求即依現前世間事能作得條條是理事事如法就是佛法古之祖師有云佛法在世間不離世間覺謂迷世間法是眾生覺世間法就是佛若問眾生迷的什麼可答云就是佛所覺的問佛所覺的什麼亦可答云就是眾生所迷的是故佛與眾生本是一法更無別法只有迷悟之分而已但現今世界上人往往自命為聰明不以為迷孰知此正是其迷處彼等所作一切事都為著這一身執此身為我若問此我是何狀生從何來死從何去則茫然不知但以為就是這數尺血肉之體與幾十年的生存而已過了這幾十年血肉之身死滅了則我亦沒有了如此看來人生世上沒有一點意思且人人以為死了就完了遂敢在這世界上胡作亂為強陵弱的眾暴寡的無所不為以為既無善惡報應死了即無事但就現前的血肉身認定為我凡我身所需要的衣食住財產等專一貪求無厭若貪求不得就發憤怒與人爭鬥此皆由於不明白各自的真我僅執定這個假我為是所以作事不循道理若問真我在那裡如何去明白他則亦不必說遠亦不必說他個特別的名字但就世人說死了就了的裡邊找出一個死而不死的東西來就是這東西如何找出呢就顯淺說世人到了死的時侯其身雖然將死其心尚罣念父母妻子財產等不隨他死又如自尋死路的人大半因為對不住人或受不住苦就想將此身自殺離開了他孰知你縱自殺其身而此為主要自殺的心并不同他一起死此不死的心就是真我從無始以來盡未來際任你經過幾千萬億年總是不會斷滅的不過隨生前所造的善惡業輪迴於六道中如生前作事規矩造善業死後再變人身善少的作平常人善多的作富貴人善更多的或生在天上作天王天眾享天上的福若生前作事不規矩造惡業死後就不必得人身了或變畜生或變餓鬼或入地獄都隨他惡業的輕重為轉移但人在世上作善者少造惡者多所以佛經上說人身難得就是這個緣故如前所說既知我們有不死的心不滅的真我則知我們平常所執的假我所謂數尺之身和幾十年的生命都靠不住勢必力求覺悟我們的真我當知這不死的真我本來不消為他貪求衣食住功名富貴等他於這等事全不用著且彼本來清淨圓滿道德品行俱高才能知識并美萬事俱足全然不要外求一點只為世人都迷了他不知去享福反以執著現前的假者事事貪求造無窮惡業竟累他時常墮入畜生餓鬼地獄等三惡道中就如奴隸犯法連累主人的一般由是以談我們說學佛并不是學一種奇怪的法術只是要覺悟我們平常所迷的真我真我既明白了則知不要再為這假我去貪求於是各人循著世界正當的道理作一切事自然士農工商各安其業各得其所國家也可安寧世界就此和平況平日習慣作好事造善業的到臨命終時這種好習慣仍然現於心上真我乘這好景象遂去受生為好人若平日習慣為惡的到臨終時好景象總不會發現一定只有惡景象真我乘著惡景象就往三塗受苦去了由此看來三世因果六道輪迴雖是這死而不滅的真我去受實在都由平時造善惡業成了習慣到他日受苦樂報絲毫不能改易了是故我們要想現在作個好人將來得好結果務須先覺悟這不死的真我照著世間正當的道理諸惡莫作眾善奉行造成一種好的習慣才是上來所說照世間法去止惡行善固然獲得福報後世為好人或上天作神等但總在三界輪迴之中福盡還墮罪滅復升時上時下頭出頭沒終是危險若要真實離苦得樂求一萬全之策只有一個念佛法門更沒有再好了此法門是釋迦佛的大慈悲心憐憫眾生自力不足不能一生修行即了生死一生不了再轉一生容易迷惑若造惡業墮落三塗前功盡棄於是教人但念阿彌陀佛求佛力加被雖自力薄弱亦可借佛力接引往生西方極樂世界一生彼土永不退轉所以最為安全蓋我們現住的娑婆世界是此土眾生惡業感召的故現種種苦惱不淨彼之極樂世界是阿彌陀佛大悲願力及諸菩薩善根力結成的故現七寶蓮池種種快樂境況但彼土雖隔此世界十萬億佛土若求往生亦不為難但照前說平日知道止惡行善更念阿彌陀佛名號就可往生因為阿彌陀佛原來造彼世界並非專為自己享受快樂是要接引十方苦惱的眾生去同享快樂的他既有此心願我們若又發心求往生則佛的心與眾生心兩相感應就如打電報一樣這邊發機那邊就知道了不費多少時間又不須走一步路只要你念他他就決定來接你去生以此言之阿彌陀佛的大願譬如大輪船大火車不信念佛的人是不肯上他的船和車信念佛的人如上了輪船火車無論什麼不中用的人臥在船車內不作一點事也就到了所以念佛這個法門是千穩萬當不問上中下三等人都能修行的就今日所說總括大略是說佛法都在世法中不必去求諸遠但覺悟我們這死而不滅的心依世上正當道理去作培其善根再加念佛則決能往生淨土了脫生死成就佛道這就叫作學佛所以我說學佛并不要離了世間法去學就諸君今日職位言是在警界正好就警察中應作之事一一作得合理如法與佛法不相違背更加以念佛則現前幾百警察就是將來幾百尊佛佛遠乎哉未之思也夫何遠之有唐大圓記見海刊四卷九期附註原題在漢陽水警廳演講今改題
