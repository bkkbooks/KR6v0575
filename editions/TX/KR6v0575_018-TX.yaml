body:
  text: 唯佛法能對治二障十二年正月在沙市佛教會講佛法不可說說有不可說無不可說非有非無不可說亦有亦無亦不可然佛法隨緣應機說有亦可說無亦可說非有非無亦可說亦有亦無亦可佛法根本是諸佛所證實相法華經言諸法真實相不可以言宣而以方便故普為眾生說以此看來佛法是諸佛所證之法以此所證之法而為眾生講說我們現在未開智慧未能了知何能說法所以要說無非是本諸經論考求十方三世諸佛之所說才能悟入佛之知見凡夫得開知見才能了知佛法世人及一切眾生皆具佛性以無始以來中了病根所以成為眾生流轉六道要以佛法治病才能悟入佛之知見今天就是講對治病的方法我們不是現在有的未生之前有前生前生之前有前生前生之前又有前生其來無始虛空世界亦如此虛空之前有世界世界之前有虛空虛空之前又有世界世界之前又有虛空也不知經過若干若干的成住壞空吾人執有現在的我並我所依的世界因有二種障蔽故何謂二障一曰煩惱障煩是煩擾惱是惱害以煩擾惱害的力量於是身心性命被其煩擾惱害而成此障二曰所知障知是知識之知於所知事事物物而不明事事物物的實相因之錯誤顛倒而成所知障煩惱又是依所知障來的以所知事事物物不能明了實相故而成錯誤顛倒以錯誤顛倒故而又生出種種煩惱如求樂得苦求解脫得束縛求自在得障礙皆是此二障人及一切眾生生來就有的生來既有二障因錯誤顛倒而起營為方法其所得結果終是苦果佛觀眾生病之所在在於二障這二種障可以人類平常所有的來證明如何證明所謂宗教思想學術思想是宗教這名詞有了不久原於日本由日本傳入中國可概括為信天信鬼神分開言之不外一神教多神教一神教者如耶教回教婆羅門教是多神教者如中國之墨教道教日本之神道教以及舊婆羅門教是一神教信天能父一切主一切多神教則奉事各種禽獸水火鬼神等然無論為信天信鬼神皆可總名之曰宗教推宗教原起是從所知障煩惱障來的何以知其從二障來因為吾人原來就是不明事事物物的實相以不明之故初時本想為善後來或反違心為惡初時本求得福後來或反違情得苦乃疑此中必有神來主宰裁制我而神之權力出萬物之上為我們所不可逃脫的此是天神教的緣起譬如我們居在深山之中無見無聞有一天走到平原之上看見天地如此高大日月如此光明萬物如此繁盛以為奇哉希有因而生疑此中必有個全知全能的主宰才能如是如是此亦是天神教之緣起再就二障推論之煩惱障中有我執所知障中有法執以我之故對於我有親愛者對於他人有與親愛相反者如對於親愛者一旦離別思念不忘以思念不忘故種種形容結在思念之中而有所謂祖先存在由祖先存在故疑軀殼之外必有靈魂死了之後永遠存在的所謂神我是這一種神我不止祖先教為然即中國之道教印度之婆羅門教也是從此來的所謂神我即是常見又有儒家主張宇宙中形形色色皆是陰陽二氣變化來的由二氣而生五行氣聚則生成為物質氣散則死物質消滅即是斷見二見皆由所知障來以所知障故而成宗教思想自佛法言總名之曰外道這宗教中或曰天神或曰鬼神由他創造由他主宰覺得吉凶善惡冥冥之中確有賞罰於是畏之懼之而祈禱之心與規避之念牢不可破所謂宗教大意不過如此依上來所說見得種種宗教源於所知障因此現在有人說宗教在萬有之上或在幽冥之中而有大力量不可觀察是拿來安定人心的操縱人心的如俗言神道設教是宗教思想既源於所知障以所知迷妄顛倒故而生不平等心以不平等心故而生人我是非以人我是非故而生戰爭如歐洲之十字軍是以此看來可見種種宗教都有二障可以證明佛教所說不虛以下講學術思想以證明二障一切學說毋論為東洋的西洋的可分為哲學科學思想哲學在古時範圍甚寬到了後來逐漸分析遂成為科學而哲學範圍甚小譬如吾人居在宇宙之中宇宙原來本體是何也是哲學所要講明的宇宙本體本體上種種講法有說是精神的有說是物質的有說精神物質合有的本體不可知所以發生種種學說推想如何變化如何進化由變化進化而成種種現象是為哲學思想以此哲學思想而成宇宙觀宇宙觀中之人講明人之問題而成人生觀西洋人講哲學的原理不外人生觀宇宙觀皆不能得真實結果即以進化論看這是西洋認為是真實的文明的而文明的結果釀成歐洲此次大戰殺人幾千萬流血幾萬里文明撲滅進化何有推原其故無非由所知障生大概古來哲學皆是如此道理近來由哲學分析成一科一科學問合之而成科學的哲學種種科學一部分一部分的來講就物質方面言也有好處但因根本錯誤之故現象無不錯誤以二障不離故二障不離所得無非苦果以上是以學說思想證明不能離二障由此推論結果宗教思想哲學思想皆發生於所知障煩惱障若講到佛學緣起處則實不同佛教緣起是打破二障超出二障之上而發出來的故無有二障所謂佛者是打破二障超出二障圓滿覺悟之人佛所說打破二障超出二障法門是曰法依法打破二障超出二障是曰僧佛法僧是曰三寶太虛望大家皈依自性三寶從此打破二障超出二障不為宗教思想學術思想所束縛才能悟入佛之知見以悟入佛之知見故出繫迫苦而得自由自在出疑畏苦而成圓覺圓德佛法之妙不可思議如是如是孫止后陳石琴合記見海刊四卷五期附註原題在沙市佛教會第二次講演錄今改題
