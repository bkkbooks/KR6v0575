body:
  text: 現代青年與佛教之關係在日本佛教青年會講一過去到現在的人間是由精神而進到物質的總觀全球覺過去時代之人類心理如中國日本暨歐西各民族其視為最可寶貴尊重者則是道德文化故西洋在中世紀則以基督教為共主而中日則以周孔孟荀之化貫澈數千年以為治理殺身成仁捨生取義至今猶有遺風其後則由道德文化而漸移到於重視政治法律如法蘭西之革命其目的則在求立法權參政權以能公立約法參預政事則可享得平等權利也到現在更知經濟能左右政治而所爭之點遂亦趨重於爭財產經濟之平均依此以觀是由道德時代而變為政治法律時代又由政治法律時代而趨于財產經濟時代了是知現代人類精神思想通同集注于物質的經濟財產方面因物質為不平之發達貧者怨憤不平而富者窮奢極慾供不應求千方百計亦不能滿其欲望以是階級爭鬥殺機遍伏流弊至此無有辦法是由精神生活而進到物質生活之路已窮矣二現在到將來的趨向是由物質而到精神的前言人人在物質上均想爭得奢侈之享用而致造成現世之階級戰爭皆是因不能滿足其欲望為動機由是反觀之乃知要想求得身命之安全當在精神上求而不在物質上求如近代歐洲大哲倭鏗之講精神生活及提倡和平弭兵息戰之舉等是則精神文化復興之動機也人類思想先既由精神而進到物質今物質路已走窮窮則變變乃通故又須由物質生活而進到精神生活然當此交替轉換之際能迴翔盤旋其間者厥惟佛法三佛教為現在到將來之樞紐考西洋文化大概多智勇而少仁慈東方文化則多仁慈而少智勇惟佛法智悲兼大為東方極慈悲智巧之文化又古代西洋雖曾得耶教之博愛今以其神話不為科學知識相容為破除迷信者所不齒威信已失勢難再立東方之孔孟雖較完善而又犯王政之嫌與今平民主義相違異是皆不能適應現代人類之思想與欲望惟佛法慈悲平等理智圓滿若能由信受佛之理智容納佛之慈悲則人世乃有復生之機四青年應站在時代之前大凡人類有青年時代壯年時代老年時代老年為休息時代壯年為服務時代惟青年為預備時代如草木之生芽開花正是進取增長的時候故青年不可退在現代之後或處在現代之中而當站在現在的時代前面去因青年是時代前進的領導者凡青年的人們不要為現代環境所籠罩應看現在趨向將來之要點何在認清方向就要向此走去不要停頓前已講明現在到將來的趨向樞紐在於佛法諸君既為佛教的青年那末就要大家充分受佛的教化以慈悲充足智慧圓滿的精神來轉移時代勿為現時之環境所困五佛化青年乃足為時代前驅者佛化的青年就是全世界人類進步之總指揮及先導者那末這個要死不活的世界非有悲智充滿之佛化青年為引導不會有生機的青年諸君就是破曉之陽光昏夜之警鐘將來之救世主今天觀貴會成立我已從無限歡喜中發生無量之希望六今後佛教之青年應走的兩條路甲現實主義舊來佛教徒之習慣大概圖清閑而不做事對於現實社會之文化教育政治等事業一概放棄而不肯為現在青年的佛教徒應該反是我們要充滿佛化的慈悲智慧加入群眾社會活動加入人類實際生活此種活動即是佛法不離世間法之義要使世間中皆充滿了佛之慈悲智慧亦即變世法為佛法乙精進主義學佛的人無論作甚麼事皆是為普利人生的未學佛的人凡一舉動大概總是為己或為宗為族為一部分而已學佛人凡所作為以圓滿的智慧充足的慈悲觀全世界人如一必為之興利除弊使全人類皆得安樂如此奮勇精進行去方是佛教的青年臨末祝諸君為真正之佛化青年來為世界青年之領導者晤一記見海刊八卷四五期合刊
