body:
  text: 佛法要略在武昌佛教會講佛法廣大約之可分三層一五乘共同佛法五乘者人天聲聞緣覺菩薩是也五乘共同教義於世出世法無不包羅世即生死義在生死界內為世間能解脫生死為出世間故人天為世間聲聞緣覺菩薩為出世間然無論世出世間皆不能出因果之範圍故明三世因果相續為五乘共同之教義蓋因果明而後知生死之所以生死生死了達而後能對症用藥以求解脫生死之方而達出世之目的茍其不然則是不問病情而妄求藥方無異盲人騎瞎馬遊行於黑暗世界不特徙勞無功且易墮入危途或更將騁其私欲妄造惡因馴至愈趨愈下即欲保持人天之果而不可得故曰因果之理不但為五乘共同之教理實為佛法入門之始基也然因果二字雖屬簡單而圓該法界一切事理無遺即吾人切近之生死因果茍欲徹底洞明真實了知其非常非斷之正理已非易易凡夫所謂身前無前世身後無後世固屬斷見即外道所謂靈魂神我等亦屬常見斷見易除只須見鬼神輪回之事實常見難破須明十二因緣諸法實相破斷者略一偏重即落於常破常者略為過量又似乎斷斷常二見固不合於佛法其破常破斷而昧於因緣真理者亦非能與佛法相契蓋人之生也由五蘊和合而成四大解而五蘊散即謂之死五蘊者色受想行識也識蘊中之根本識名阿賴耶能保持無始來本有新熏有漏無漏一切種子五蘊和合之相續既分散其種子中強有力者起而為主又和合五蘊之身即謂之生生而復死死復又生生死流轉無有已時即由因生果果復為因因果循環相續不斷之義也現在之報由於過去之因而現在之業又生將來之果生生不己故非斷現在之果不同過去之果將來之果不同現在之果隨業轉變故非常譬如國家由人民積合而成人民解散則無所謂國家故不可謂常然自古迄今以至於無窮雖朝代屢更新陳代謝而此和合之國家仍非烏有故不可謂為斷學佛者宜先信此因果之理而後可言信佛法若由信佛法而宏揚佛法尤宜細心參悟精深研求而後能持為利器以行方便之化導二三乘佛法三乘者聲聞緣覺菩薩也解脫生死求證涅槃為其共同教義二乘之目的全在乎是菩薩雖發心廣度眾生亦非不自求解脫且必自能解脫而後能解脫他人利他之性愈急則自身之解脫愈不容緩故菩薩之出三界與二乘同其出生死外以提攜生死內之有情所謂為眾生而修行者則與二乘但求自了之因地有間矣三大乘不共佛法其特點為求無上菩提乃大乘菩薩所獨修與二乘但求涅槃者不同其目的在證得大圓鏡智其果位之無量光固無所不照其在初心時即已了知眾生皆有佛性與我同體故其大悲心發乎自然不待勉強所謂眾生度盡我願力乃盡之大願皆大悲之所流出固非二乘者所能幾及也綜觀地球今日人類能聞佛法而略生信心者已居少數其能由受三皈而守五戒十善者又此少數中之一小部分此一小部分中能真發出世心非求世間名利恭敬者已如鳳毛麟角其非求世間名利恭敬而又能發度脫世間沉迷之大悲心直向無上菩提者更非所常見故居今日欲佛法普及不可執人天乘法為淺小而不說必須以人天乘之佛法為佛法普及之前提方能挽狂瀾而回世運今日佛教會同人之宜擔此重任實有責難旁貸者同人其自勉焉黃慧勤記見海刊五卷六期附註原題在武昌佛教會之開示今改題
