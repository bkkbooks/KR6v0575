body:
  text: 為什麼要修學佛教十一年四月在黃陂縣自新堂講一何謂佛教二佛教之內容三佛教與吾人有何關係四吾人因何要研究及修持佛教佛法的精義甚深難知不是言語可以說出來的但他的義理雖然深妙卻又在吾人日用尋常之中並非離掉吾人日用尋常另外有所謂佛理佛法只因吾人迷逐幻影不自覺知將自己本來現成的佛理拋在九霄雲外好像佛是佛人是人斬然截成兩橛似乎佛法與吾人沒甚關涉一講到學佛便好像是一件希奇古怪不合人情的事這就錯了現在分四層來講一何謂佛教佛者梵語佛陀漢譯為覺者故佛之一字即指一對於宇宙及人生之迷夢乃至一切世出世間萬法之迷夢能夠徹底打破而得大覺大悟之人由此大覺悟人說明宇宙萬法之真理并說明此真理人人皆可悟到又為之創設種種能夠悟證真理之方法由此種種方法是佛所施設之教法故合稱為佛教吾人若能確信其教法依教奉行必有解悟真理實證真理之一日也二佛教之內容佛是覺悟者之義其所覺是宇宙萬法之真理而此真理及萬法乃人人心中所同具祗以一向迷卻本來不能調和聚集令其顯現了達故流轉生死繫於業苦莫能自拔佛教即為此一大事而立教者也其內容以佛法僧三項為主法者軌持之義謂能軌範任持一切事物故僧者清淨和合衆之義一心照了一切法一切法集顯於一心相融攝無礙故又佛者說法化導於僧者也法者由佛施設於僧者也僧者依法修行於佛者也非佛無以有佛教非法無以成佛教非僧無以持佛教故佛教之內容必具佛法僧三者三佛教與吾人有何關係吾人心之自性是靈覺的若非究竟正覺之佛無以悟吾人心覺之自性未免恆為迷失本性之人又吾人覺性是遍照法界萬法的若非佛法遍明法界一切法則無以顯吾人性覺之相又覺含法界萬法唯心故吾人的體用性相是法界萬有調和一如的若非佛法之僧統理大衆一切無礙則無以全吾人性覺之用故若非佛教則吾人便失其為人之真價值而吾人之體相用一切皆失以此可知佛教與吾人關係之深切矣四吾人因何要研究及修持佛教吾人向來因迷亡其真價值致體相用一切隱沒不能現前施行自在而從此迷惑造妄動之業感牽縛之苦故吾人欲脫苦須淨業欲淨業須破惑欲破惑須悟得其真價值明體達相以全其用此則除佛法莫能為功也故吾人當研究佛所說之教法而了解其理由了解其理更進之以修習行持乃能實現吾人之真價值也依此四端可知學佛為吾人極平常極必要之事而決非不近人情者也王淨元記見海刊三卷十一期附注出前川聽法紀聞之一原文無題今補
