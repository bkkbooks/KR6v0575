body:
  text: 論佛教與孤兒院七年在寧波孤兒院講今幸寧波佛教孤兒院開成立會矣太虛嘗訂定斯名為發起人之一茲當略說佛教孤兒院之義以釋回惑而資信行一佛教之本性心佛衆生三無差別有佛無佛性相常住然道無自相宏之在人今吾人所知所信之佛教溯厥源泉實流出於釋迦牟尼佛大圓覺心大圓覺心之成分真智慧與真慈悲也真慈悲之謂釋迦真智慧之謂牟尼大圓覺心之謂佛大圓覺心具衆理而成萬事之謂佛教故佛教之本性即真智慧與真慈悲而佛教之本性又即吾人之本圓覺心也然云真智慧真慈悲當知與世俗之所謂智慧慈悲者不唯絶異且適相反世俗以科學哲論為智慧以倫理神教為慈悲蓋佛教中之倒想妄見凡情我愛耳故欲證得吾心真智慧真慈悲之本性當別開方便之門若求之科學哲論倫理神教則奚啻南其轅而北其轍乎證真智慧之方便門有三曰無實無相無願無實即無可執取義亦是空義姑就挽世科學所依止之唯物哲論以言之其謂宇宙諸物皆屬現象然有原質為彼實體或說原質有若干數或說唯一伊態爾氣今試問彼所云原質為盡異乎環境諸現象耶為不異乎環境諸現象耶不異乎環境諸現象則此若干數原質者此伊態爾者亦現象中之一現象耳既同為現象則不得獨指之為實體蓋異乎環境諸現象而絶非吾人之官覺心知所能構接者則此原質云實體云已超出經驗之外自違科學之例僅憑虛擬立之一空名詞耳彼既認原質為集起宇宙現象之實體今考之所云原質先空無所有則由原質而集起之現象譬猶織蛇毛所成之鮫衣益屬空無所有之事從可知矣彼科學家唯物論家所執為實在者核之乃唯是一無所有之空名詞故曰倒想妄見推此一端餘可例知了其唯是空無所有則倒想銷而妄見除始稍稍開發真智慧矣無相即無可分別義亦是假義即就空名所詮空相言之空若決定有空相者有此空相空應是有空既成有有亦成空空之與有交無定相是以名相本無義界假立以假立故互遍通徹以遍故諸法一相以一相故離相無相以無相故無可分別無分別故絶待圓融入無相門真智慧乃朗然洞徹矣無願即無可趣作義亦是中義即就一相無相絶對圓融言之隨舉一法皆得為一切法中心具一切法則吾人亦莫不本來具足一切功德無缺無餘更何趨求造作之有入此無願門者真智慧赫然圓成矣得真慈悲之方便門亦三曰無貪曰無瞋曰無癡世俗之仁愛皆從自營私欲中好攝他屬己之念而孳乳人固有不必以身軀為自我者然以身軀為我所安危與共之一物故愛著生存壯佼順從其所樂役役以為之殉而不恤推此以泛觀殉諸所好乃至殉國殉教殉義雖高下異數通局殊會其本質固同為自營私欲也即父母之愛子女亦以子女從自身種種勤勞得成愛子女無異愛自造之功業藝術且盼其報恩及嗣志於將來耳由有所貪求而施仁愛既以自私為本根則人各有其自私之念互相扞格必不能悉如己意遂其所求於是嗔恚生矣貪而遂則戀著不捨反之則由嗔恚而怨慕無已凡是皆所謂愚癡也今創辦佛教孤兒院諸人稍有欲藉之以保存或擴充佛教之勢力及欣羡他教之由此暄赫流俗意將追步其後而與之競爭甚且逐逐於聾瞽其心者之毀譽稱譏盛衰榮辱之念不能暫釋乎胸次則佛教本自慈悲適以孤兒院乃貪嗔癡之矣其為求一己之名聞或冀所住寺庵賴以安利者更無論已蓋佛教之真慈悲須以真智慧為正因先淨盡我愛之根株空諸所有後不可思議之真界觀諸如幻衆生本具無邊福智徒以迷惑顛倒執著纏縛自為障礙不獲現證於是興慈與樂運悲拔苦濟物利人不由分別是為清淨之善二佛教與世界衆生依佛教當言世界衆生就通俗之名詞言之亦可云佛教施行於社會之利益夫佛教之施行於社會即佛教本性之發揮於世界衆生也然世界無邊衆生無量淨穢千差苦樂萬殊故惑業有淺深而障緣有廣狹佛教隨之而為差別遂有五乘之法夫衆生但是迷情而世界無非妄相使之脫迷情而離妄相悉證乎真覺圓德遂有出世三乘聞佛法而悟本唯真覺圓德迷情妄想體性空寂世界衆生不度而度名為佛菩薩乘是佛教之本旨亦佛教施於社會究竟之益也其次雖未能即證元心德性然以有出世善根故或因自觀察力或因聞佛法力得以解脫迷情超離妄相是為獨覺乘聲聞乘又其次以未能具出世善根貪著迷情妄相為實雖聞佛法不能了知諸佛大慈愍故就迷情妄相使之畏罪求福止惡作善回動向靜息想歸神是為人乘天乘儒為人乘道為天乘耶回梵哲諸教介天人雜鬼神而為人天乘其所以導民為善化人入神者宗教哲學所大同者也故佛教流行於社會之利益上者為餘宗之所無下者統他教之所有盡世間一切政教學術之利益乎民生者不足比佛教利益之萬一三孤兒院定義通俗所知者幼而無父或兼無母或兼無諸姑伯叔親友戚屬為撫養教育者則為孤兒若今孤兒院所收養諸孤兒是也進就佛教之勝義言之一切衆生皆為佛子凡未能發菩薩心生如來家從般若母依慈悲父受法喜禪悅之食披解脫莊嚴之衣獲清淨功德之財成善巧自在之用以之逼迫乎根塵識馳驟乎貪嗔癡輪回五趣顛連九有生死苦海沉浮不定善惡業道竛竮無歸若我今現前衆人暨乎宇宙一切生靈胡莫非茫冥弱喪之孤魂貧窮孤露之孤兒哉四佛教與孤兒院夫救濟勝義之孤兒佛教出世三乘之事也唯佛教之所能者也救濟通俗之孤兒佛教人乘天乘之事也亦世教所共能者也今既因吾人惑業深重未能率九界有情得佛法菩提涅槃之益隱蓋天擎地之大丈夫相效扶牆摸壁之嬰兒行與孔墨耶回之徒共營人天善業以辦此通俗孤兒院則亦姑就通俗孤兒院之所善者言之耳考通俗所云慈善事業若賑災恤兵保赤濟貧施醫養老諸端則有養無教若辦不收學費之小學校半日學校星期學校夜學校諸端則有教無養或遍濟以慈悲未足增其智能或稍開其智慧未能盡其扶助胥未若孤兒院之對於孤兒者衣之食之醫之居之盡其慈濟俾有以遂生於現在復授以國民教育益其智能俾有以自立於將來也故孤兒院者實發揮智悲兼大之佛教本性於世界之最好場合也五孤兒院與社會廣義之社會小之以言一家庭大之以言全世界國群亦社會之一不言可知就消極方面言之社會中何以有游民流氓乞丐馬騙竊賊強盜淫娼罪囚乎雖由社會種種惡習相緣起核其總因則固在乎應受教育之時代為孤貧所困而未能晉受相當之教育造成其自立自治之能力即令社會上減少其有害無利之分子也抑已由游民乃至墮落為罪囚者原因不一且不久將離乎社會雖救之亦鮮成就而孤兒之墮落於將來則純由他人遺彼之困難迫成之且其有害於社會者為日方長吾人坐視彼無告赤子墮落為將來害群之馬實不仁之尤坐視其害吾群於將來不先設法以防止之又不智之甚也更就積極方面言之不唯造就一孤兒即令社會上增一能自立自治之人且疢疾益智孤孽者達自古聖賢豪傑大都出於孤寒唯其孤寒故操心苦而慮患深智術德業乃日修月進令兒童之長大於縱逸戲樂之家庭其不逮育成於整齊嚴肅之孤兒院審矣即佛法中之修行人亦於苦諦為第一大師則安知將來無德被群生功垂萬世之聖賢豪傑由此甇甇孤兒中乎六佛教徒與孤兒院夫佛教徒者以宏法為家務利生為事業者也以言宏法則孤兒院與佛教之本性既如此密符可不力求發揮乎以言利生則孤兒院與社會之公益既如此閎遠可不力求發達乎今寧波佛教徒既發心辦此佛教孤兒院當各盡其能力之所及以維持擴充之不待論矣竊願我東震旦土各省道縣之佛教徒皆發心組立佛教孤兒院由佛教第一孤兒院乃至第幾第幾十幾百幾千幾萬億孤兒院林林總總使大地無復孤貧失學之兒童則社會之公益蒸蒸發達佛教之本性亦稍稍發揮耳有此人道以為之基然後可以端心慮趨菩提救濟勝義之孤兒咸成無上正等正覺見覺書一期二期附注原題寧波佛教孤兒院之演說
