body:
  text: 應日本關係中華民國之五團體歡迎會致詞十四年十一月在日本帝國俱樂部講鄙人七年前曾到貴國一次當時見全國所充滿者皆是物質的文明前次之震災雖然物質奇巧的反感然亦為同業所招之報應為冀免將來的災危覺有施行佛化之必要遂有東方精神文化復活之氣象至謀中日親善實為兩國國民應有之要事以同文同種之國實不應有此互相猜忌之心今後以佛法謀中日之親善實為得計切盼兩國人士之努力精進滿智記見海刊六卷十二期
