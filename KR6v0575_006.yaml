body:
  text: 佛教與吾人之關係八年十月在尚賢堂講佛教與吾人之關係一者佛法是人人好覺悟好平等好自由好普濟之共通本性故二者人人不好迷信邪信好正信悟信惟佛教能令人人悟自心之佛而信自心之佛教絕無一點迷信邪信而得極圓滿之正信悟信故三者佛教能滿足人心之宗教上要求故四者佛教能滿人心學理上之要求故五者人人皆欲於世界人生兩問題得究竟之解決惟佛教能得究竟之解決故見覺社叢書二期附註本文自覺社之佛教集講演會中節出
