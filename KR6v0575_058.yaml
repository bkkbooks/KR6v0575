body:
  text: 勞工之道德在裕豐紗廠講現代之人界日新月進而其增進之原因確由人力工作之發達則工作實為世界進步之原素也試觀動物之中除人以外若禽若獸類皆藉天然之功用而存活如服羽衣毛茹毛飲血既無求進之思亦無上達之念蠢蠢然消磨其往世之宿業而已而人則不然饑之食渴之飲寒暖之衣服涼燠之房屋每日之需用一一莫不由人工製作而來足見勞工者供給於社會之大功也譬如米飯來之於農始由下種繼而耕而收而礱而炊經如許工力方得入口豈如畜類之自然而飲食乎觀此則人畜之異點彰而吾人必當勤於工作亦可知矣飲食如是衣服器室亦然若所居之屋必須經木水泥鐵諸匠之工技而後成更其材料亦必由經若干部份之氣力而來豈如禽獸之穴山架樹而居乎則人之貴於禽獸者亦即能以手工而處置其衣食住耳故吾輩今既為人必宜作工有工作方稱為人不然則與禽獸無異世人明乎此理自然能每日勤力而作其所有之工作矣而其人亦可稱不失為人之資格矣今貴廠集合多人共同工作出其製造品供給於世界此實可欣可喜之至況乎貴廠製紗可由紗織而成布帛使社會一般人藉此布帛得以溫暖者非諸君之功歟而諸君足稱社會最尊最貴之人矣今太虛得能同室交談其樂何如耶今有數語太虛謹以勸告於諸君一勤如上說吾人日之所需須由工作而來然工作尤宜於勤若不勤則一曝十寒欲求事之成就者罕矣古云一夫不耕天下必有饑者一女不織天下必有寒者一人廢工尚且如是何況多人若是則諸君既入工廠豈可不以勤其工作為旨乎切莫閒遊放漫而空費可貴之光陰但當勤作工業即為社會之最有價值之人物此太虛之所深望也二儉吾人既異於禽獸則衣食必來自製作之力而一粥一飯來處不易半絲半縷物力維艱況人易老年老則力衰力衰則不能工作無工作則衣食來自何所故當年輕力壯之時預先積其糧食預積即儉之謂也故云宜未雨而綢繆毋臨渴而掘井諸君既勤於工豈可忽乎儉用之道歟三和和乃成事之根本立業之基礎今如諸君同居一廠上自廠長下及工員互親互愛而相和合故貴廠之實業日見其發達若不然則無論事之大小各相破壞所作無成故兄弟和而家興上下和則國強信哉斯言也四慎一言興國一言喪邦乃因謹慎與粗忽之關故也諸君既知工作為最尊貴之事業則自當自尊之慎重之切勿粗言暴氣自取其敗若行之於先悔之於後者晚矣五信信為吾人處世之根本而在諸君工作者於信尤宜重視之所謂信者乃心口無二若心有所思出之於口切勿口是心非心是口非若心口不應則失信信失尚有誰敢親近乎故我釋迦世尊重戒於妄語也凡人之重用吾重於信也既因信而重之言合道順尚畏何事之不成乎昔者有乞丐行於路上於草際見一皮篋乞丐知此必人所遺失遂守而不取因恐此物失自窮苦者若取之將受其罪也未幾失主覓之而來蓋一銀行長行長見丐者不取非禮之財重其人任以事不數年丐者亦遂發達而為銀行主矣丐之由丐至銀行主者非由信而來乎吾人初生性本純潔經云人之初性本善奈何趣世稍久積習漸深近朱者赤近墨者黑因熏習之不良成社會之敗類依人度食其恥胡底故宜振之奮之而取自立對諸惡習遠避而湔除之則何慮不為社會之崇貴乎若欲尊榮於社會豈可忽於上列之五字無如眾生苦惱或迫於餓寒或困於疾病致忘其勤儉失其慎信此亦勢所難免今也幸有挽救之機欲求挽救莫如求佛蓋我佛大慈大悲廣度有情凡遇所求求無不應若吾人能禱拜而敬信之我佛必能依吾人之禱者而應焉此有教理之根據非迷信語閱者進而研究之可也夫佛通號也今君等耳所向聞者則莫若阿彌陀佛及觀世音菩薩然阿彌陀西方極樂之教主普遍光明壽命無量使眾生離苦得樂之慈父也觀世音菩薩向極靈應尋聲求苦之悲主也諸君欲得社會之尊貴者歸宗莫如信佛我佛慈悲定能攝受惟願諸君勉之靜記見海刊八卷十一二期合刊附註原題在裕豐紗廠演講今改題
