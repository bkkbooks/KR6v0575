body:
  text: 世界宗教會成立之希望五月十二日世界宗教會在上海新法界寶昌路南呂班路山東會館大成殿開成立大會因未預會以文代講僕忝墮佛教之數得為世界宗教界中之一份子請攄所知略貢微言竊宗教之名佛教素有之凡屬於言論者則曰教屬於觀行者則曰宗蓋以之區別言行者又有分佛教之理論為若干部判之曰某教某教者而隨一倡道者出於佛理別資一途信從者繼續不替後世遂頌之為某宗某宗者復有譬宗為綱喻教為網者就此三說根究其字意皆各個代表一義適成一反例今世通稱之宗教二字必由譯述者取西文意會中文假定無疑然通稱之曰宗教宗教連合宗教二字成一名詞其名義果何在乎如宗教學者於宗教之內容外觀種種方面皆有研究之心得獨於宗教之名義殊未睹正當解說名無定義將何從徵其命名之意乎竊謂宗者信仰也教者理行也能信仰此理行者則為人群能為人群所信仰者則此理行合宗教與人群之關係而言之則猶云人民所信仰之道理及行為耳明乎宗教之名義如是斯可以窺其命意而進求乎實際也進求其實際之塗術維何曰研究倡導何等道理建立何等行為足以使全世界之人民永遠決心信仰者即倡何等道理立何等行為以副人群大同之趨嚮焉耳但世界之宗教亦夥矣各術其術各神其神甚至互相攻詆互相非毀真理乃愈離愈遠如江河之一決而永不能復合良可痛矣荏苒荏苒以至於今日學說朋興橫議紛起知識益進化道德益退墮潔士仁人殷憂莫極何幸乃有世界宗教會之發起以治宗教之弊而救世道之窮僕嘗忝為會員之一兩赴成立大會均以改期而返訪聞今日確開成立大會竊留他方未克遠赴故以筆代口披露區區且未暇亟進頌詞惟希望我世界各宗教之上士彼此虛心研究棄短取長使各教之真理離而復合繫人群之信心久而彌堅則不惟宗教之幸抑亦全世界人類之幸也僕將從之以觀微觀妙諸君其毋外僕也見世界宗教會記載第二冊附注原題釋太虛演說稿今改題
