body:
  text: 佛化青年之模範十五年十月在廈門鴻山寺為中華中學童子軍講太虛此次由星來廈承各佛教團體及各界領袖熱烈歡迎殊為感激而對於貴童子軍尤深歡喜故特略陳數語以申謝忱自西方物質文明東漸以鎗炮戰艦飛機等殺人利器傳入中華國家社會遂深感不安而東方固有道德文化之精神亦因之萎靡不振吾人處茲顛倒狂亂之世亦應將東方固有之精神文明傳播西方灌輸于金髮碧眼人腦海之中以救其弊而解其毒此等大任全賴青年諸君欲勝此任有二童子可以取法今為諸君一介紹焉二童子者一日文殊師利童子一曰善財童子文殊師利童子智慧廣大凡世出世間一切諸法無所不知無所不能善財童子道德最尚而好學尤切凡具有學問乃至有一技一能之長者無不親從其學雖年輕小不嫌其幼或年老大不厭其腐茍有可學雖蹈湯赴火亦不畏退其求學之精神如此可謂大勇無畏者矣諸君若能取法二童子則將來不難擔荷傳播道德文明於西方矣此二童子之歷史備詳於佛説華嚴經諸君欲明其底蘊可取而讀之誠良好之師友也時間短促不能細談諸君勉旃勉旃蕙庭記見海刊七卷十一期附注原題對中華中學童子軍之演講今改題
