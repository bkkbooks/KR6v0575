body:
  text: 經商與學佛十五年九月在星洲晉江公會講平常人看得學佛是很難往往聽人講究佛學以為我未講究過不能去研究實則佛學並不艱深而學佛亦並不難世間無論何事均可與佛學之理相通無論何人均可以研究佛學各位大都是經商者所以拈此經商與學佛一題略與各位討論之一經商與學佛之心理我雖未曾作商而知凡在本鄉或海外經商者其心理大都是在求得發財所謂將本求利是也學佛之心理亦在求得發財但非經商者僅圖金銀財寶衣食房産等之獲得而在求得功德法財禪定神通福德智慧等以為無窮之受用耳兩者之內容雖不同而其希望在求得發財之心理則一也再表以明之甲經商者所求之財金銀財寶等肉體的一部份有限之財乙學佛者所求之財禪定神通福德智慧等肉體及非肉體的無限之財商人求財之用途或為個人生活或為家庭生活或為社會公益或為世界公益等學佛者求功德法財之用途小乘用以自度大乘用以自度度人而以佛法度盡衆生齊成佛道為目的此示兩者之大較也二經商與學佛之行法經商者是在通有無利人生如甲處所無者指各種貨物言則以乙處所有者以運濟之反是若乙處所無者則以甲處所有者以運濟之于一般人之生活至有裨益學佛者是自利利他望人成佛以所得福德智慧之自利再用以利他正與經商者之以運濟貨物流通有無便利人生相等也至經商者之行法大抵可分三種一資本豐富者或作大商業之經營如設大公司大工場等二資本少者或用其智識能力而作各種之商業三資本無者或運用其勤儉之勞力而作小小之商業學佛者之行法亦分三種一上根人之具有福德智慧者學佛甚易二中根人之具有少分福德智慧者學佛亦易三下根人福德智慧全無者但能勤懇發心只要肯學亦能成功中國向來有行商坐賈之説運輸貨物流通各地者為行商固定一地銷售貨物者為坐賈坐賈與佛法中之專一行修以自悟悟他者相類行商與佛法中之參訪諸方以自度度人者相類大概經商者自己須有經商之知識經驗與夫高尚道德而又須能觀察社會上之情勢臨機應變應付環境如是商業始有發達之希望學佛者以自利利他為標準尤處處以隨宜修持及觀機設教化導衆生是務觀此可見經商與學佛之行法殊無二致也三經商與學佛之關係吾人在世凡作何事若專賴自己有限量之知識能力而應付茫無依恃之外境繁無限量之現象實有所不能於此須在精神方面求得安心定志之處以為補助然能使人得到安心定志者探之世界各宗教學術莫若佛法因餘者均偏惟佛圓滿經商者茍能學佛則可得到精神上之安慰而有一定之把握其補助作業之功誠屬不鮮雖然如何學佛須得方法簡便者以先受三皈依皈依佛皈依法皈依僧為是蓋皈依佛後則己之生命已得一種之保障不致墮落皈依法後則因得聞正法漸起正信精勤進修可至成佛皈依僧後則己身即預菩薩聲聞等聖賢之中所作無不成辦矣復次吾人經營商業不能專恃自己之知識能力而即可得到很大之利益還須恃有一種道德之標準果能先受三皈依以為信仰佛學之始基繼修五戒十善以為道德之標準如是則能作一很有道德信用之商人由此推廣亦即所以造成很有道德信用之商人社會豈不甚善由上説觀之經商與學佛關係至巨願到會諸君細心探討佛教之真理身體力行達到商人之目的以所得之資財辦宏揚佛法之世界公益則經商之道即與學佛之道相通可以直趨無上菩提而本日之所講不為虛過矣寧達蘊記見海刊七卷十期
