body:
  text: 紀念佛誕的意義十二年四月在中華大學講今天四月初八是釋迦牟尼佛誕期的紀念日並且是他的二九五年的誕期紀念日我今天所講的就是這個題目我們必須先曉得了什麼是佛他是如何來的然後我們方可以曉得今天的紀念是甚麼一回事甚麼叫做佛佛就是覺者的意義淺言之就是一個極明白的人已經大醒了的人佛字乃簡稱梵語佛陀就是無上正遍覺者的意義佛的體是甚麼就是我們各人及一切世界萬物所共同的本體此本體亦即是各人如如常覺的真性若有人能完全通達此體性者此人當即是佛若迷此體性即名眾生但我們眾生雖是迷了我們的體性然我們的本體真性仍是現成的完全的無有些子的傷損絲毫的減缺這個本體真性佛經中亦稱之為如來法身這個法身在於佛就謂之法身佛諸君應知佛體即你我共同之本體真性我們若能因今天的佛誕紀念喚醒了自己的本性則今天的佛誕紀念不但是釋尊的紀念也就是你我自己的紀念了上來所說你我與佛同體不過是說得這法身佛的理而諸君對於如來法身的真相實在一點也未有夢見所以佛經上說理雖頓悟事須漸脩諸君雖已悟得此理如不脩證則諸君雖與佛同體而諸君仍是眾生諸君應知釋尊之所以稱為佛者非天帝所贈封之名亦非人民所共舉共讚之號乃由他先悟了法身的理繼修六度萬行經三大阿僧祇劫乃至親證了這法身的完全真相得了大覺圓滿的果故名之為佛雖說他的體是你我所共同的然而他的這個由脩得來的大覺圓滿果則是他與阿彌陀佛等所獨有的你我尚未能有的這個不共大覺果佛經上名之為報身佛上來雖說佛的體就是我們及一切世界的體性然而這所謂一切實在不是你我的見聞覺知可以完全曉得的因為一切的世界實在太大而你我見聞覺知所及的境界實在太狹雖說在明白了的人見之無處不是然在我們這些久迷的人實在遠求之於千里也不可得不但求之而不可得且愈求之則愈遠所以這佛的法身不是我們的言說所可表詮的既非言說所可表詮如何我們今天又能來為他開大會做紀念呢況且論到佛的報身那我們更無可紀念無從紀念了因為他那大悲大願大功德所成的大覺果是不共於我們的也不是我們的思想所可緣得到的既然思想尚緣不到那如何又有我們今天的這佛誕紀念大會呢諸君應知佛的法身報身皆非言說所能詮思想所能緣的故於此二者皆不可紀念亦無從紀念而所以有此紀念會者實因為有釋迦牟尼佛的應化身的原故所謂佛的應化身者即如所謂二九五年前有一佛降生印度之迦毗羅城其名曰釋迦牟尼其父名淨飯王其母名摩耶夫人其幼名悉達多十九歲出家三十歲成道成道後說法四十九年而涅槃其應化世間之跡如名人家族等皆當時人之所目擊於後世亦有傳聞可憑經史可考所以我說惟應化於人世所示現之生滅身可有紀念釋迦生於四月八日所以我們今天就為他做誕期的紀念上來雖明紀念會之來由但是諸佛以何因緣而應化於眾生中呢這個因緣有二一由諸佛本願慈悲度生復見眾生之所以升沉於苦海之中者皆由於不認識其自己的本體法界的實相而於境界上妄計有人我苦藥好醜的原故若得大力者指導之即可使之自證本體出離苦海以是因緣故諸佛乘其大悲之本願運其大智之萬能遂來應化於我們眾生類中所以我們稱佛應稱之為大悲救世者二由於共業所感所謂共業所感者例如現今中國之所以大亂及生民塗炭而不聊生者皆由於國人肆縱其貪瞋之念作種種惡業的原故假使中國人人皆具有道德皆作善業亦何至變成現今的中國呢諸君應知眾生之所以有佛應化其中者實由於大多數眾生之共同善業所感所謂諸佛之報身猶如月光眾生共同之作業猶如水波月雖常照於水但必隨水之清濁有無而隱現其影諸佛度眾生之悲願雖恆古不易剎那常存但亦必隨眾生善業之深淺善根之厚薄示現隱沒諸君於此若能明暸即是悟得應化之真理應化之真理若明即可由之而悟入法身之實相證得報身之實果我於此就敢對大家說我們於世界上的一切惟佛乃有真正的價值足以為吾人之所紀念因為那些世間人的種種的救濟方法及救濟的事實皆是頭痛醫頭腳痛醫腳終久是不能使我們出離這苦海使我們得大自在的諸君細心想想夢中人如何能喚醒夢中人所以我說有真正的價值足以為吾人所紀念者惟是已覺大覺的佛我們今日因紀念此已覺大覺的佛若能從睡夢中念念自求其醒覺乃不虛此佛誕紀念之一舉陳維東記見海刊四卷七期附註原題二九五年佛誕紀念大會太虛法師在中華大學演講說詞演說集作佛誕紀念會在中華大學之演講今改題
