body:
  text: 祝南洋佛教之聯合十五年九月在星洲福州會館講太虛此次南來承諸同志殷勤招待不勝感謝星洲諸山長老及各大居士發起講經會邀太虛主講自問雖於佛學曾事研究然並未有何切實之成就殊為抱愧今天與諸位見面之始洵為難得之因緣從欣慰之中發生無限希望略言如次考星洲為南洋群島之總口管歐亞交通之中樞能於此地固結團體議訂辦法將我佛大法從事宣揚自不難敷暢於五洲矣蓋現代學說多有所偏惟佛圓融堪救斯世吾人果以我佛之大慈悲心為根本發菩提心猛勇精進自度度人則佛法必遍行寰宇光昌大地也近年國內各地兵戈擾攘天災人禍挾以俱來民生困苦達於極點有識之士多提倡佛法以資挽回現時收效雖微將來結果必巨此可預卜也今我僑胞痛世界之詭變紛鬥難已念人生之無常墮落堪虞因而有斯講經會之組織屬意甚善功德無極惟太虛猶有一言貢獻於今日與會之諸山長老及各大居士者則切須注意於此後南洋佛教聯合會之籌備是也現今世界凡欲舉辦何事不可不聯合多數人以為之吾佛教徒處此繁劇競爭之時代尤應本乎互助之意義聯合進行一則可免彼此隔閡之弊一則能收互相扶助之益故南洋佛教聯合會之設立誠為當務之急而不忽視者願諸同志努力促成焉甯達蘊記見海刊七卷十期附註原題與華僑同志見面時之演講今改題
