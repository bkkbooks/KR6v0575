body:
  text: 在中日佛徒聯誼會致詞十七年一月在上海講頻年盡力佛化實感佛教有與各國聯合共進之必要而東西各國惟日本能保存各國輸入之佛學又能融貫西洋哲學之所長深望中日兩國從事於佛化之共作俾成為東方最高之文化現在與玉居士等創辦寰球圖書館期萃集東西各國之佛教圖書為世界佛理之新結集現已粗具規模深盼中外諸君協力扶助見海刊九卷一期
