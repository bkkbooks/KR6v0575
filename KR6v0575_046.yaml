body:
  text: 唯識之名義十五年六月在北京彌勒院講唯識之理廣博無量非略談所能盡今但就唯識二字之名義一談云何名識即今日俗語所云知識如何名唯乃單獨義連合唯識二字可云獨有知識而無他物但知識有能所之兩方能知識者有八種識如眼能知識色是名眼識耳能知識聲是名耳識鼻能知識香是名鼻識舌能知識味是名舌識身能知識冷熱粗細等觸是名身識然前五識各能知識自變自緣之特別境不能兼知識他識所知識之境至第六意如一閣之總理則能兼知識前五識所能知識及不能知識之一切諸境又如吾人睡眠時眼耳等前五識皆停止不起作用儻猶有種種之夢生起即知是第六意識之作用至於睡最熟時夢亦無有則前六識皆無但偶有蟲咬或蚊剌時即時身起盲動用手搔爬應知是乃尚有第七末那識執著有我故也末那譯云意與第六意識不同亦云意根既有能執我之第七識亦應有所執我之第八阿賴耶識此譯云藏藏有三義一者含藏一切法之種子謂之能藏二者為一切法之所藏隱者謂之所藏三者為第七識執之為我謂之我愛執藏所知識者共有六塵境界謂眼識所知識者名曰色塵耳識所知識者名曰聲塵鼻識所知識者名曰香塵舌識所知識者名曰味塵身識所知識者名曰觸塵意識所知識者名曰法塵至第七末那識所知識者即第八賴耶識但第八是識而第七妄執為我是為錯謬知識至第八所知識者即前七識之種子及根身世界之本質又吾人所認為根身世界者即色聲香味觸法等六塵則應知世間萬事萬物皆無實體不過識所知識而已然有一疑問謂若外境皆是識所知識今試於北京欲知識一泰山何以不能此則宜知前六識不能獨立成其知識尚須依託別識所變之本質以成其自識之知識此別識所變之本質即第八識之相分凡識皆可略分為二部分一能知識之作用謂之見分二所知識之相狀謂之相分二十二日午後大圓記見海刊七卷八期附注原題在彌勒院説法今依義改題
