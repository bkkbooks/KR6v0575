body:
  text: 為求受皈戒諸官兵說法十二年正月在江口東山寺為陸軍第八師步兵第三十團講昔釋迦世尊為順應一切執金剛菩薩衆之特別機緣故開法界心殿示現毗盧遮那佛身宣說圓滿果海祕密莊嚴真實言教今日此法會之衆既無異一切執金剛衆則此江口之東山寺亦無異法界心殿而應此特別殊勝之機亦當為說特別殊勝之法其各諦聽法華經中釋迦世尊普告大衆曰如來法王出現世間王於法界興賢聖軍與諸煩惱魔業魔生死魔天魔等戰既獲戰勝乃解髻中寶珠以賞諸有殊勳者故佛法僧三寶無異一大軍國而皈依三寶受戒修行者亦無異加入於此軍國之中共盡義務同享權利也但世間之軍國乃彼疆此域互相戰守增長煩惱造業受苦者也而佛法僧寶之軍國則不離當處反之自心以制治降伏剋滅諸煩惱業苦而得大解脫得永安樂者也今欲加入佛法僧之軍國以達到解脫一切煩惱業苦獲得自在安穩快樂之目的當如何發趣如何究竟且略為一申說之入佛法僧之軍國當首由皈依三寶以為投軍入伍既投入軍伍當發無上菩提心以為主帥一切身口意等諸行業皆須依遵此主帥之命令而動作絶對服從不得違背若稍有違抗則便喪失法身慧命既知主帥當知主帥所常駐之大本營即是平等大慈悲心凡隨從主帥者衣食必於是寢興必於是乃至登山入海輪刀上陳無不必於是不可稍離於此然此一大軍國之國土是何則佛魔聖凡平等所依之一真法界是也吾人既投入佛法僧之軍國當遵菩提心主帥之命令從慈悲心本營而行止以守護此一真法界之國土降伏治化一切魔凡等衆務使盡為良民安居樂業共享和平毋令稍有侵害擾亂於此一真法界中者此上為最先要了知之第一義但吾人即心自性之一真法界無始來久為一切無明惡見貪嗔妄想等魔賊侵擾欲得安居樂業於此非奉主帥依大本營大興一番戰伐而剋伏之不可策略既定當以行布施波羅密為戰術能捨一切貪著離一切執取犧牲財物乃至身命以保安一真法界救度六道凡夫故然若非軍紀嚴肅則戰術雖佳時或不免反增擾害故當進以持戒波羅密為軍紀能止息殺盜淫妄等壞習慣惡嗜好之一切過失故外善戰鬥內嚴軍紀更當行忍辱波羅密以為防禦身則堅盔厚鎧營則深溝高壘能令安固不動不為一切六塵境界風三毒無明風所搖奪故既能防禦更當行精進波羅密以為運輸水則舟艦陸則車馬空則機艇向前退後四通八達往來迅速進行無滯故然若非衣食充足材餉齊備則軍心不能凝固故當行禪定波羅密以為軍需凡一切工程錙重皆出於是能成辦諸事無所勞乏資悅身心無所疲倦故然雖已一切完備若無利器仍不足以破煩惱賊之巢穴斷生死魔之命根故當行甚深般若波羅密多以妙慧之刀劍實智之槍炮照空五蘊度一切苦厄乃能殺盡一切魔賊撫輯五分法身功德之良民安居一真法界所謂護生須是殺殺盡方安居至是乃為究竟成佛也若能如是了知如是修持則此身便是佛身此地便是佛地經行及坐臥常在於佛中更不待向他人求法矣乃說咒曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶此咒即為佛法僧軍中之祕密口號常持誦此咒則能安住出入於佛法僧之賢聖軍中而無阻滯切要切要但於前來所說以歸依佛法僧之三寶受持殺盜淫妄酒之五戒尤為至要故稍停當為傳受三皈五戒俾能識自本心明自本性以善為護持再不毀犯染污也蕭止因皮劍農合記見海刊四卷四期附注原題在江口東山寺為陸軍第八師步兵第三十團中求受皈戒諸官兵說法記今改題
