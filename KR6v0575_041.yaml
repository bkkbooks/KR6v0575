body:
  text: 佛教與吾人之現在未來十四年十一月在名古屋市政會講今天得到有名之名古屋市又得到市議會來與諸君聚談榮幸何似而見諸君之踴躍歡幸則又徵諸君對於佛法之精進未講佛法與吾人之關係以前且先談佛法大旨佛法是覺悟的而非迷昧的是平等的而非階級的是慈悲的而非暴厲的以正覺之智慧與平等之大悲為佛教根本精神發而為救世利人之事業此為學佛者之正當生活佛法建立於正覺大悲上故其施設亦不離正覺大悲吾人生於人世當謀人世幸福人世的幸福當於正覺大悲中求夫人之所以為人即有超過非人之特點即佛教所謂之大智大悲故忿爭愚癡之心非人類所應有人能本此超非人之特性而行則不良之行為可以除人類得以安寧而人格亦以完備佛法中首先戒殺以殘殺有失人德人能不殺則人世間之戰爭可弭然而人生之保持者為衣食住而人世之攘奪者亦唯衣食住當知衣食住三各有分齊不可以強盜之手段而侵奪之各安其分勿事爭執此佛法所以有不盜之戒以之而行則人格之安寧得子孫之繼續蓋人倫存於夫婦之道此我佛之所以戒邪淫也人各有志有心有思想彼此不知而能表現其志其心其思想者為言論故所發之言不可虛妄此佛法謂不兩舌不妄言不綺語不惡口此之四戒為佛法人乘正宗此吾人之所當注意盼諸君實行之而高尚之人格可以養成但人以食色為性若不克除其貪心瞋忿爭鬥心則發必擾亂社會最先尤應戒除癡邪心而後方可去種種過惡惡既除善斯生此即佛法與吾人做人之標準亦佛法與吾人之現在關係也人格既成矣而人生不過百年縱可一生幸福亦是轉眼空花所謂幸福等於癡人說夢能與吾人以究竟幸福者唯我佛法立吾人之真生命非父母所生亦非現在而有所謂前前際後後際無始無終而現在生存之色身殆業力之暫現耳若能豁通三際則人生之大可以證而真正究竟之幸福以之得然以心若猿猴之人類更以外境之牽纏引發業力以之而變化流動所謂眼隨色轉耳隨聲轉儻無主宰於其中則危險滋生而真人生之幸福亦不可得佛法有救脫此危險之方曰一句彌陀染念俱淨能行斯坐斯而念到無所念與彌陀之願力相接觸引生萬善脫離衆苦而人生之究竟幸福以之永存以此觀之佛法能與吾人以道德之標準永久之幸福於過去現在未來獲福無量祝諸君精進獲此無量之福滿智記見海刊六卷十二期
