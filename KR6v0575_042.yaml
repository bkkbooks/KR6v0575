body:
  text: 從奈良說到佛法之本源十四年十一月在日本奈良興福寺講奈良為日本古文化之中心點而在座諸君都係各宗長老以太虛之淺學何敢在諸君前饒舌蓋奈良為日本佛化之發祥地吾人借境生情而推徵原始佛教之思想勃生蓋諸佛為何而說經歟菩薩以何而造論歟夫原始佛教曰苦曰集曰滅曰道斯四聖諦為根本法輪經云所謂苦逼迫性所謂集招感性所謂道可修性所謂滅可證性苦為逼迫而厭苦欣樂人之恆情然倒行逆施之苦惱眾生以苦而為樂經又云此是苦汝應知此是集汝應斷此是道汝應修此是滅汝應證蓋知苦必斷集慕滅必修道四聖諦中唯此道為關要故佛說三十七道品法而令之離苦斷集人間世始有究竟出苦法門佛說此四聖諦時正在波羅奈國之鹿野園而奈良多鹿今日與諸君聚談不禁聯想到我佛昔日之鹿苑法會鄙人此次到貴國參觀各地覺得奈良為東亞佛法之源泉更以法相三論各宗之根本道場均在奈良吾人以大乘佛法之教義推之所謂境行果三括之殊盡為學之始在明所觀境由境起行由行證果大乘各宗詳於境者不外乎三論法相三論宗遮破一切而法相宗則建設一切一破一立不落有無故談大乘佛法必先以三論法相為根本明境之後當繼之以行所修法行莫尚律宗如攝律儀戒攝善法戒饒益有情戒自他兩利惟律宗之三聚戒具之三宗之根本道場均在奈良故奈良是日本佛教之發祥地然於大乘之無上果法言之則莫善乎華嚴一部華嚴經無一字一句不是顯佛功德莊嚴之圓圓果海者奈良東大寺為日本華嚴宗初祖所興道場由此種種推徵則奈良於佛法中位置之重要更不待言由三論法相以明境大乘律宗以起行華嚴以明果境行果三法為一佛法藏之大綱奈良佛教兼而有之洵大觀也日本佛教表面上是與中國一致而於施設上則與中國異日本佛教是政教一致神佛一致然此皆為應用上之方便剋實的考究吾望全日本都以奈良之大乘各宗為準繩則與佛法之真庶幾日近滿智記見海刊六卷十二期附註原題奈良興福寺之演講辭今改題
