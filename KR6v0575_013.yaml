body:
  text: 論佛法為人生之必要十一年六月在安徽佛教會講論到佛法大意本來頭頭彰顯不待言説言説不及若欲方便開演則塵説剎説説之終不能盡今又安從宣揚起耶夫佛法雖不單為吾人之需要而施設亦不單為吾人之需要而存在但吾人欲信解行證於佛法必先知吾人於佛法有必須之需要心志乃能堅切故今且就吾人之需要上一推論之通常所謂吾人者實唯指此身命而言失此身命即無所謂吾人故吾人以維持保護此身命之生存安全為第一需要而衣食住等等資生之具及營謀此資具之事業尚矣然此身命資具非突焉而集蓋有從之而出生而長存而歸著之處故上之則有宗祖父母下之則有子孫雲礽更自伯叔兄弟旁及姻婭戚畹而有此大家族光前裕後養生送死之需要矣以今察之家族又棲寄於群衆之社會使無秩序安寧之社會則家族亦不能保其團聚傳續之繁榮故秩序安寧之社會亦成需要更進而察之則社會之安寧秩序又須有強固嚴整之國政以保持之故強固嚴整之國政為尤要然使國與國常相戰爭侵伐則大地莽莽刀兵之劫至無時國群家資之為身命所需要者仍無以保全則太平大同之世界又尚矣推至太平大同之世界庶乎完成保持身命之需要矣然旱潦不時則飢饉洊至陰陽失調則疾疫流行其所以困厄身命者猶在才可寄其希望於化學農學物理學生理學醫學等等進步以免除之耳藉令刀兵飢饉疾疫之三災皆滅而人生身命之安全達於極度但人身生活之命限殊促上壽百歲世不數覯五十今衰七十古稀極全世界人類所傳承所創造之智力用以保持之者卒不過占空間者數尺占時間者數十年之身命老死一至即歸澌滅堯跖同為腐骨聖愚盡化黃土草木禽蟲朽亡無擇不亦大可哀歟或曰吾人行孝慈於家族則祖父孫曾之彝德有恆立忠信於國群則社會政治之功業可崇施仁義於世界則人道文化之言教垂久使吾人死而不死以常存者固有此立德立功立言之三不朽在焉然此三者之所以為人稱誦不衰亦祇以相續相互能維保於身命而已微論其保持之者仍皆為一個一個數十寒暑即消滅之身命都無價值可言即就其相續以言子孫相續無不滅之家族君民相續無不滅之國群人類相續亦無不滅之人類及無不壞之世界家族國群人生世界皆滅壞之時此三不朽云者亦尚能保存而不朽乎故此之不朽云者亦不過茍延殘喘慰情聊勝使吾人僅如此者其最後之結果卒不免歸於斷滅虛無而已欲求所謂不虛此一生者終無所得不尤深可哀歟夫既得此生當求不虛得此生若使此生終歸斷絶則今亦安用維持由維持此生命而得不虛之真果於身命乃有維持之必要故既能滿足維持身命之需要當以求其不虛此一生為尤大之需要於是探究生生不生化化不化之本元或名之曰天命天性天理天主自然自在大道大梵太極真宰上帝神我等等而崇拜皈命之以冀保存其最高永久之價值或乘萬化而無極或登九天而永生則從凡夫又轉成外道認有漏業果為真常覺性業盡果壞依然一場落空至此則欲求不落空亡而成實效惟佛法乃成第一需要矣佛法最初淺之説即在能供給凡夫所希望不虛此一生之需要而發明從惑起業由業招報得報又起惑之正因緣生果義以破除外道之邪因無因使先有以發見惑業果三流轉不斷之生死苦輪方知外道所崇拜皈命者正此生死流轉之苦果所依起之惑業而已既知生死流轉之苦輪及見苦果集起之惑業可斷則苦網可得解脫而當修戒定慧等種種正道以超出之矣故欲了脫生死當先了知生死知苦即是了知苦惑業苦之牽率流轉修道以斷集證滅即是了脫生死凡外且未能了知生死又安能了脫生死乎了知生死則便見一言一行之業皆將展轉獲果招報以相續無盡已足使吾人得知前無始後無終內無中外無邊之業果恆流價值不滅矣此為人天業果之教然或善或惡或罪或福浮沉不定升降無主非修生空慧以根本解脫之則常處勞作憂慮之中難免危怖故三界不啻火宅而三乘竟出苦門也此為三乘解脫之教雖然三界之苦招由妄業妄業之興乃依迷惑迷惑而有有非真有如睡心之夢事譬眚眼之狂華故彼業果當體空寂但能智照現前本來德性圓成此為大乘般若之教設非佛法吾人終末由捐衆纍而圓萬德故惟佛法為吾人最切之需要然佛之法門方便無量雖一切皆能得入而在此邦則北宋來要以參禪念佛二門為實踐之行參禪須頓悟本心直下相應一切繁興常不離此蓋非大力量人一站站住者不能餘雖覺悟其力未充尤不免隨無始業習暴流以流轉則非以戒定慧法一門深入久久修習以轉其現業流識不可此則念佛一法亦為具足戒定慧法一念中修之妙門矣然專念阿彌陀佛以求往生極樂淨土者因此方惡緣充滿衆苦逼迫生命呼吸尤為危險長劫修行以轉識成智艱難不易於是本師釋迦佛引同十方諸佛皆懇切示教吾人在西方有一極樂世界乃阿彌陀佛本行淨願所成專以不可思議願力攝受十方世界沉沒在苦海中之衆生使藉登彌陀願力大船先誕登安養之地然後於純樂無苦諸佛菩薩常會一處之淨土聞法修行以令有進無退欲上此願船者一須深信佛所示淨土之教真實不虛二須時時發速出娑婆苦海而往生極樂淨土之願三須止惡修善力念阿彌陀佛俾與佛之本願及其淨業相感應一致則平日常為攝護而臨終決承接引不致隨雜業流轉矣斯又為吾頭出頭沒於苦海而無力自拔諸衆生所最需要之法門吾人有感覺於佛法為需要者即當勉力行之安徽佛教會記見海刊三卷八期附注原題在安徽佛教會之演説今依廬山學改題
