body:
  text: 護法十六年三月在福州功德林歡迎會講此來為佛法際此危急存亡之秋有以謀團結而圖救護已經貴林代表宣告於先且諸林友既信行佛法則於佛理必多研究了解而能真實修行矣毋容贅述但佛法處此危難之空氣中謀如何救護佛法於千鈞一髮之間轉衰為盛大行佛事即余之素志亦今日所急待討論者也所謂護法非謂佛之法要藉吾人為護法金剛經云如我說法如筏喻者法尚應捨何況非法則可知佛已捨一切法而一切法皆為普濟未度彼岸之衆生而設我們正為自度度他故而要護法蓋衆生之於佛法猶暗室之明燈度海之舟筏為度衆生之昏溺故須體佛本懷以護持正法耳當此危難時今為我佛門四衆對家裏人說家裏話但求切實不事虛套須知利濟衆生非要成佛方能凡了解佛法而篤信修習之學佛人皆應隨時隨地應機設化故人人須先發菩提心行菩提道以利濟衆生也若能如此乃謂之真能護法而衆生亦實得其益矣佛法甚深微妙不易證知學佛者難而苦之所以往往習非為是作機械式之法門修習以致大乘正法流於猥鄙不獲普濟衆生之心不修大乘菩薩行以濟世利生乃招迷信消極自了之譏發普濟衆生心者即為發大慈大悲心既發此心而後修行利他曰菩薩行楞嚴經云未能自度先度人者菩薩發心蓋菩薩以同體大悲視一切衆生之苦猶己身苦所謂以他為自而即以普利衆生為自利也學佛者能發心行菩薩道即可以護持及昌明於佛法抑亦成佛之第一要著也否則即為毀滅正法者法華經云三世諸佛皆以一大事因緣出現於世又云為令衆生開示悟入佛之知見則普令衆生入佛知見固為三世諸佛之本懷以衆生本來是佛徒以迷故妄受生死妄求涅槃開示悟入佛之知見則衆生立地成佛於此能直下承當得起則宏法利生為分內事當仁不讓復何所用其推諉耶諸位久植德本以三世諸佛之本懷為懷擔當佛法普利衆生聯合四衆積極進行從事護法度生之工作以期內契真理外應時機實所厚望諸位於佛法門皆久已修習余本無甚可說不過不欲辜負此一會之時節因緣重為提起所謂一回提起一回新願與諸君共勉之寂光記見海刊八卷八期附注原題在功德林歡迎會之演講今改題
