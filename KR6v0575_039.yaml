body:
  text: 中日佛法之異點十四年十一月在日本京都市政公所講現在將應南禪寺晚齋之請不能與諸君詳談謹將中日兩國佛教異點略舉數條並盼諸君指教一日本佛教初由朝鮮傳來旋即消滅後經聖德太子之經營漸次派遣貴國高僧留學敝國而敝國之大乘各宗斯傳貴國中國佛教雖由漢明帝夜夢金人於前而摩騰竺法蘭以後傳教之梵僧大都自動而來內求與外來不同此中日佛教之異點一二日本佛教起初由聖德太子個人之深信與提倡後又由大多數貴族之繼承維持並有出家而維持佛法者在中國則與異也中國佛教純由深山大澤之高僧住持歷朝佛法雖由當朝保護出家住持佛法者大都以隱逸為高朝貴與野逸之不同此中日兩國佛教之異點二三日本佛教經聖德太子提倡之後國民能領受佛法並各自努力提倡而中國由漢時排百家而尊儒而以神仙惑世之道教亦同時成立至佛法之到中國初經五嶽道士之排斥繼以三武一宗之摧殘全國佛法幾經絕續而唐宋後儒者排佛之風亦盛在貴國自聖德太子而後蒸蒸日上維新初雖經神道教之妒詬然於佛教之大體無損承受與排毀之不同此中日兩國佛教之異點三四日本佛教自傳來之後一一皆能保存持久如天臺真言均發揚光大至今未衰在中國則以朝代之變更國內之戰爭有明德之帝主則佛法興遇橫暴之君王則佛法毀唐而後各宗之式微以此保持與流變之不同此中日兩國佛教之異點四五一國有一國之國民性而國民之性寄於宗教學術貴國固有之教為神道教故貴國國民心理近於神祕而佛教密宗之能在貴國特放異彩此為一大原因而在敝國則人心趨重性理及自心之修養古文化之諸子百家與佛法之大小乘經論皆不甚融洽逮唐朝慧能大師直下明心之禪宗始興推原佛教之所自流出於佛陀之大菩提心禪宗在直下印證自心為與佛無二之覺心一方既窮佛法之根核一方又適應華人之心理遂打入華人之心理深處發舒為宋明儒者之理學故隋唐後之佛教當以禪宗為中心密與禪中心之不同此中日佛教之異點五六日本現存佛教之各宗派大率由高祖傳來如何即保存與傳受如何故各宗派皆有獨立之精神此精神之目的即在尊傳來之祖日本佛教大都如是中國佛教對傳來之祖雖有相當之尊敬而實際上則尤推重於釋迦牟尼為唯一無二之所尊以祖傳之法亦出於釋尊故尊祖與重佛之不同此中日佛教之異點六七日本佛教之能有進無退之原因則在聖德太子憲法之制定而政教一致故能以佛法施諸朝野充滿全國至中國治國之責向為儒家所專有佛教不但不願加入縱加入亦必與儒者衝突故佛教徒率以閉門自修為職志化群與修己之不同此中日佛教之異點七八近代日本佛教於古代所傳保存無缺適應現代由西洋來之新文化漸變其古風而期普及民眾至近代中國佛教徒之努力者在恢復隋唐間佛教之古風以隋唐光明燦爛之古風復則佛法之勝以彰故為復古思潮之運動校勘經論而從教理之整頓適今與復古之不同此中日佛教之異點八前來八條不僅說明而已是希望中日兩國之佛教徙相互了解而取長去短互謀東亞佛教進一步之發達前來所舉掛一漏萬盼諸君糾正之滿智記見海刊六卷十二期
