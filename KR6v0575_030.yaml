body:
  text: 世界佛教聯合會宣告開會之宗旨十三年六月在廬山大林寺講現在世界說文明史的要不出東西洋兩大系西洋文明系可以基督教代表之東洋文明系可以佛教代表之然東洋範圍很寬凡屬東半球皆是若印度暹邏緬甸日本中國乃至波斯等然則一教何以能代表東方之文明如印度有婆羅門中國有孔教老教及諸子百家等日本有神道教其餘諸國各有其習俗的教多是很古很盛很普遍佛教以時間論不及印度婆羅門教之古以空間論亦不及婆羅門普遍五印度中國儒道亦然然佛教所以能代表東方之文明者因其餘諸教唯通行於本國境內不得通行境外例如印度婆羅門中國儒道等唯佛教發源於印度流布中國由中國而朝鮮而日本其餘暹邏緬甸西藏各地均有佛教東亞之地佛教幾無不遍此為佛教代表東方文明者一至若佛教教理山重水複層層疊疊圓融入妙無有阻滯能淺能深能略能廣白雲紅霞卷舒自在語其淺有人乘天乘能涵蓋世間一切有漏善法盡語其深有菩薩乘佛乘能括出世間一切無漏無為法盡語其略一言包羅或無有言說語其廣大千世間無非古佛文章謙下若水無微不至虛通如空無孔不入此為佛教代表東方文明者二今則將進而融攝西方文化合天下以開全地軸之新文明此廬山有本會講演之所由也然此一大事因緣為世間有德慧術智之士所共同有分非一家一國之私事也願諸君進而教之茲先請日本真言宗權田大僧正代表小林僧正講演照吾儕以大日如來之密光俾淨嚴妙心皆得以開顯焉象賢記見海刊五卷九期
