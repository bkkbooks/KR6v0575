body:
  text: 歡送日本佛教訪華團致詞十五年十月在上海去年我們在貴國時蒙各方面之歡待至今銘心不忘此次諸公來臨我國萬事不周甚為慚愧太虛當諸公渡華之時各方面之種種事情冗繁須說明者尤以南洋方面之招請為要出發時舉凡一切均託王一亭居士辦理凡所不到之處諸公萬勿置於中懷也諸公至上海時余遂急欲歸來輪抵福建又引留數日昨始歸社未得與諸公久談洵為遺憾今日在此得歡送諸公喜為遺憾之中一好因緣也語云有志者事竟成余三年前欲聯絡中日兩國之佛教發始於廬山得佐伯僧正木村博士之來華引起去年東亞佛教大會我國二十餘名之佛徒偕赴貴國今又得諸師來華考察佛教今後擴大宣傳使兩國之佛教直接結合研究佛學宣揚佛法以期引起世界佛教徒之活躍教化眾生實利無量矣余此次到南洋去於新嘉坡設立南洋佛教會第一步工作使佛教文化得便流通於南亞細亞從此能擴大進行引起教育事業由是非推行佛教大學與圖書館之建設不可就兩者之前途觀之經營上在南洋佛教開發上為何等之必要希我佛徒共力為之照南洋現狀考察所見略敘如此祝諸公健康同聲呼佛教萬歲法舫譯自日本佛教徒訪華要錄見海刊十卷三期
