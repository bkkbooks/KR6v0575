body:
  text: 追蹤古德的精神十四年十一月在日本天台宗大學講同人今天冒雨來山承諸君不避艱難遠迎實深感謝今日目睹諸君情形吾人不禁聯想到傳教空海等諸前輩之故事當傳教大師等往敝國留學時海道險阻交通不便而諸古德仍破浪乘舟而到中國將中國之臺賢禪密各宗相繼畢業歸國開千年不磨之門庭而我們回想自身此次赴東亞大會處處承貴國同胞之厚待尚感疲乏追思古人實深慚愧今天諸君不避艱險遠迎想諸君心理不過由同為佛學之感情冀中日佛化之發達而已由此足徵為上追古德之遺風不啻為第二傳教也更等而上之則諸佛難行能行之行諸君亦得之也大概平常人都把色身看得很重故處處均感不便而於諸佛諸祖無邊際等虛空自他兩利之苦行遂無從做起蓋學佛之要在自利利人二法中均以苦行為重故吾人談佛學必先忘身以身為行之纍耳此佛之所以先破我見也而鄙人與諸君亦當勉力於此再學佛之要在直截根源天臺中心智顗慧思慧文三大師所説者皆由自證離言之不思議法界中流出故我們學天臺必先要將天臺之根源尋出而後以全力赴之智者為中國小釋迦吾盼諸君為日本之小釋迦也更進而言之真實的佛法非凡情所能了解而欲求佛法真實亦非易言必先要具有超佛越祖之志願克苦勤勞傳教諸古德之能在日本佛教為開宗之高祖者以此盼諸君努力祝諸君進步無量滿智記見海刊六卷十二期附注原題在天台宗大學講演辭今改題
