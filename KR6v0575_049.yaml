body:
  text: 袪世人對於佛法之誤會十五年九月在星洲中華總商會講今天得與海外僑胞在星洲之中華民國的總商會歡聚一堂以佛教之道理相談敘是非常欣幸的趁此良好的機會且先將世人對於佛教所誤會之處略與各位討論一下依佛法言本來一切衆生均具有佛性佛之真理不從外得不過因世人未明佛教真相之故致生誤會而為障蔽遂於佛法不能信解今天到會諸君大都對佛法是有信仰和了解的但諸君欲希望一般人皆信解於佛法尤不可不將其誤會之處一為分釋之一愛國者以佛教不宜國家興盛之誤會有一種富愛國心的人存心愛國民大衆欲使本國興盛雄峙世界得到美滿的幸福和榮譽此種人是極可敬的但每每不信佛教因他認佛教雖高深玄妙但是不能使國家興盛的其實此種心理純是誤會的他不知佛教是宜於愛國的很可以幫助國家之興盛的並不與愛國行動相妨礙的例如古來有最信佛之阿育王及戒日王等曾以信仰佛教而統一興盛其國家後舊教復興即婆羅門教等佛教衰亡其印度國家亦隨之衰亡又如我國唐太宗及明成祖時代最興佛教而國亦強盛明末清初一般人皆毀佛教而竟至衰亂今日本暹羅等國為亞洲最信佛教之國亦為亞洲僅有之獨立國由此可見能信仰佛教奉行佛教實可以興盛國家而不信佛教每致衰亡故愛國者正須研究了解於佛法也二流俗以習見之僧尼代表佛教者之誤會一般人以佛教雖講得如何高深圓滿但因習見一般僧尼之行為並無足以令人可尊崇者遂以之推測佛教不過如是不足信仰此種人是以所見僧尼代表佛教實屬誤會極矣以未一究佛教內容之真相也請以佛教內容之成分言之佛教應分三種一佛人格極高尚因能拋除富貴發心救世以道濟人故二佛法佛法置于現世之科學哲學中均為無上之真理實可以利樂人群並行不悖此法為釋迦牟尼佛所自證而教人的微妙真理故稱佛法佛法者自覺覺他覺行圓滿之法也三佛教徒修學佛法的曰佛教徒此分二種甲超人的佛教徒如諸天及聲聞緣覺菩薩等乙人的佛教徒此又分二一非部衆的如宰官長者等二部衆的此又分二一清信士女如在家奉佛之優婆塞優婆夷等二出家僧尼此又分二一修證宏化者二流俗習見者平常一般所見之出家人不過是佛教僧尼中流俗習見之一小部份何能以之代表高深廣大之佛教明乎此則無謂之誤會可完全消釋矣再表於左以清眉目佛教徒超人的佛教徒佛教佛法非部衆的宰官長者佛人的佛教徒清信士女部衆的修證宏化者出家僧尼流俗習見者三經濟學者以佛教徒為分利之誤會現代一般講經濟學者以為人人能生利則人類之生活發達可共享優裕之幸福因專注重生利方面遂病佛教徒為人類之贅疣是分利而不生利的寄生蟲認佛教為不可信仰茍信仰則有害於人類是誠極端之誤會也須知信佛是信佛作事是作事佛教徒凡士農工商均可作不能專詆其是分利的況且世上之人均是互相為利的士農工商各有其責職各有其互利之所在當公平分判之即以佛教徒中之僧尼言若能求得佛理開化世人使增高道德心不作害人事所謂以宏法為家務利生為事業如是則佛教僧徒不唯不分利而間接直接為利於人群正無量矣四經世者以學佛必須出家之誤會有人心想學佛而以學佛必須出家遂致不敢學佛此亦大誤會也須知學佛不必一定出家出家僅佛徒中之一種在家亦可學佛但能明了佛理潛心修持成佛地位人人可到參照第二條所釋自然一切無礙也五熱心世事者以學佛為消極之誤會有欲挽回世道拯救社會者以學佛為消極不能裨益人群此亦大誤會也須知佛法中有大小二乘小乘在自度當其修行時雖似消極而實則以小乘為階梯仍漸次達到大乘之積極救世至大乘菩薩則純為自度度人之積極行為故佛法不唯不消極且是積極中之積極者六懶散者貪山林間靜為佛法清淨之誤會有人生性懶散夢想出家以為山林間靜可享清福如是之人遂使世人誤會佛教徒皆是好懶貪間無所事事者須知真偽當辨善惡宜分如上之人本非真實佛徒何以故若是真佛徒雖處山林非貪靜樂蓋以預備自救救人之材具耳如讀書者之在小中大學時之景況正所以作將來濟世利人之用也至所謂清淨二字佛將世界人群治理得極和好安靜之意非懶散者之貪間靜可當此也七著無者執虛空斷滅為佛法寂滅之誤會有人執虛空斷滅一切沒有為佛法之寂滅此亦誤會而未知佛經中所謂諸法寂滅相不可以言宣之意也淺言之佛所云寂滅是人世上各能相安無事共得清平內無劫盜之苦外無侵奪之患即一切不好的事完全沒有曰寂滅由此可見佛説之寂滅二字正是世界人類之所共同希望者也八著有者懼佛法説空消滅人世之誤會有人以佛經中説有五蘊皆空無常苦空等誤認為佛法一味説空若信佛法則將來人世亦必為之消滅因生恐懼不信佛法是不知我佛當日説法之方便意旨也佛説法時對著無者則説有對著有者則説無皆破其迷執務以使一般人徹底知道人生宇宙之真相耳上來所説乃略釋世人對於佛法所生之誤會而已尚未談到佛法之正題太虛在星洲尚有時日改日再與各位詳細討論佛法中之真義寧達蘊記見海刊七卷十期
