body:
  text: 抉偽披真二年正月在延慶觀堂宏誓研究會講人之處世貴真率耳德莫德於真賊莫賊於偽古之聖賢豪傑無不成於真也然偽亦即出於古之聖賢豪傑故老子有聖人不死大盜不止之説竊鉤者誅竊國者侯侯之門仁義存嗚呼演及今世人智益開人偽彌甚袞袞諸公集大事而享大名者察其表觀其言聖賢豪傑誠何多讓但茍一揭去其假面目則黑暗之裏幕醜穢雜肆殆令人不可嚮邇此所以真潔高尚之士憤之嫉之不能自己慨然欲披髮入山抱石沉淵以謝此五濁惡世也然而悲天憫人之念梗於胸次嘗思抉偽披真必有一根本解決之道期有以一洗現社會之偽習促人類黃金時代之實現太虛不敏略有一得請就此以貢陳諸君之前一曰名譽不足惜太虛嘗作名之罪惡論得數萬字於去年八九月間刊登於紹興公報今不能遍舉試質言之則名譽者事行之所著而社會所以酬有功者也又名為實之賓一受此名譽之報酬則事行之實功即由代替而消滅故智者功成而不欲居名也且名譽一成即為名譽所纍而惜名之甚者動止顧忌言行多諱當為而不敢為不當為而亦為乃無往而不以偽彼汲汲唯名是求者將謂名譽既得可為所欲為殊不知所欲為者未能為而已奔疲於名矣凡若是者皆終身一名之奴隸而已縱得名垂萬世既已自喪其真復以偽熏偽流偽毒於天壤亦罪人之尤者耳況務名而不務實名又未可必得者哉故吾人立身行事莫若以真真何所憑亦自憑之良心而已良心者萬物之端也純任良心者一動一止一言一行雖舉世譽之不加勸盡人毀之不為沮心如直弦無所遷就活潑潑地不受污染維摩曰直心是道場此也孟子曰浩然之氣至大至剛此也陽明子曰但憑良知即知即行此也莊子曰是進於知者此也無恐怖無沾滯無趨避無顛倒故大真實人即大解脫人而一是以名譽不足惜為本二曰道德無可崇夫道德者何乃吾心之寂然不動感而遂通天下之故者耳唯其感通天下之故也故於宗法社會則有所謂各親其親各子其子在大同社會則有所謂自由平等博愛在儒教則有所謂仁義禮智信至佛教則對六蔽而有六度對三毒而有三學對十惡而有十善對八萬四千煩惱而有八萬四千法門復有所謂四無礙辨四無量心四大無畏四精進行等凡是皆道德之迹非道德之所以迹也徒崇拜古人道德之迹而不求之自心之所以迹是為心死之人莊子曰哀莫大於心死身死次之故金剛經謂若有菩薩以無量無數身命布施衆生不如聞此經一四句偈功德尤大大般若經謂若復有法過於涅槃我亦説是空而達摩對梁武曰造寺寫經並無功德淨智妙圓體自空寂也蓋著道德之迹則矯揉造作姦偽百出非愚即妄無往而可萬物皆不能各安於真性而天下囂然矣博愛為殺人之本偃兵為造兵之原非虛語也故吾人安心立命亦莫若以真真何所在即空寂之自性是也百千功德性自具足無施不獲安用外求崇拜道德之迹者不自知其適與道德背馳也吁是亦佛之所深可憐憫者乎然名譽不足惜不足惜亦不足惜道德無可崇無可崇亦無可崇若以太虛不足惜無可崇之説為足惜可崇則又適與太虛不足惜無可崇之説東轅西轍矣佛之説法無非與人解粘去縛耳若於佛語轉生執著則諸佛亦將無從施其辨也太虛末學何足以語道且未嘗習知俗世之禮法獲受聖賢之教化故出言吐語大都不經僻行怪狀不理衆口然隨宜示現不存軌則如鳥飛空並無足迹可無論也即就事相以論之髮留一寸本出佛制服隨國俗自古已然彼印度之比丘固未始穿袍著褲似吾國俗人今所目為和尚者也雖然太虛於是無可不可茍有機緣湊泊則隨感而應尚可由圓頂方袍者現為非圓頂方袍者況由非圓頂方袍者復為圓頂方袍乎魚相忘於江湖人相忘於習俗彼以太虛為奇怪者彼亦自奇怪之耳太虛自撫之良心奇怪二字殊未敢承認也夫隨喜贊嘆因利而導廣運方便不主故常此入世利生之宏範也觀堂創於四明尊者道香德馨被於天下顧降及近世幾成穢藪流風餘韻湮滅無存今得佛教偉人諦公來為住持劈頭以改觀堂為觀宗講寺以樹作新之基入泥犁而莊嚴現淨土於彈指躬逢其盛曷勝欣羡而式海智恆桂明玉旺諸師復有宏誓研究會之設與太虛夙昔心期尤為吻合不自知其言之纍纍喜可知矣今以時間短促所懷欲吐者僅以概括之詞出其端緒他日有暇當探蘊宣奧列舉而一詳述之人言亦言太虛無言正言若反幸諸君垂思焉見佛教月報一期附注原題觀宗講寺宏誓研完會演説詞今改題
