body:
  text: 孝順之道是為佛法在漢口佛教會講一孝順父母以身命之所從生故二孝順師長以德慧之所從起故三孝順業因以依正報體之所從成故四孝順聖教以真理正智之所從得故五孝順法性以世出世間皆依為本元故六孝順佛心以世出世間皆依為主導故見海刊五卷三期
