body:
  text: 菩薩行先從人道做起十四年十一月在神戶華僑講學會講今日承我華旅居神戶各僑胞之招待得於此莊嚴聖潔之講學會受諸君歡迎來此講演佛學欣幸何如然佛學乃真修實證之學既非口頭講了可以完事且舌底無衲子筆下無禪師而佛法直是離言絕思不可說的換言之要證明佛法是何必須親身去成佛否則欲從佛之言語文字中求了知佛法終是不可能的依此說來豈不一切經律論皆成廢話而吾人既未成佛且不知如何可以成佛不亦於佛法皆無路可通耶所以不能不以種種方便譬喻之辭強為之說世人營營於一身之衣食住進之則為一家有餘力者能兼顧鄰里親友鄉黨桑梓廣之能為一國至能天下為家四海為友其仁心普及於全球人類者已同鳳毛麟角況能發盡於未來度盡等虛界一切世界眾生之菩提心歟然所以如此者則因局執占空間數尺方占時間數十寒暑之色身為我而不知迷此為我實無有我在浩浩渺渺之真生命海中此不過一浮漚而已浮漚起滅靡常心海固湛圓無際無始無終無邊無中循業隨量變現諸有有皆幻有妙絕思議於此恍然大悟乃知人生自有真而菩提心蓋不待他發本來現成如是耳悟得本菩提心而志求無上菩提者即為菩薩菩薩之行先從做人之道行起做人之道首在一歸依處依一切善行之最清淨本源的佛法仗淨行善友為輔導以五常之德綸貫於五倫之間修持十善為信滿入住之基礎能如是則現身為人世之賢聖足以上追孔顏將趣圓滿之菩提定可親近彌勒同人等赴東亞佛教大會之後遍遊日本各地名勝明早即須登舟歸去匆匆不能多話惟舉此為臨別之贈言人身難得佛法難聞冀諸君聞熏思修能深究於佛法藏海而超然自悟滿智記見海刊六卷十二期附註原題神戶華僑講學會演說今改題
