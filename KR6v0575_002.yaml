body:
  text: 佛誕紀念會演説二年四月為清海講演作佛身充滿于虛空而恆處此菩提座佛果有生滅乎哉如來者無所從來亦無所去佛果有去來乎哉衆生有生滅去來之情斯佛現生滅去來之迹衆生之情盡如來之迹亡淨法界身固未嘗有出沒也然佛既循衆生之機示生滅之迹吾亦安能遽破人類之執見而衡於般若之真理哉顧幻娑婆世界中幻閻浮提之幻衆生以幻演幻幻幻不同而今古俗殊東西時異於世尊誕生示滅之迹遂傳説紛歧莫衷一是或謂佛生於此方夏桀時商末武乙時西周昭王時穆王時東周平王時桓王時莊王時二十九主貞定王亮時佛滅或以穆王壬申敬王庚申西藏則以靈王乙卯錫蘭則以景王丁已甚至有謂佛生於漢文帝時者上下相差之數不下千載各信其説共有七十餘家之多可謂極支離奇幻之大觀也由是觀之可見衆生迷昧之情無所不至天地人物無非幻之表示歷數文言無非幻之現象益可曉然也但由於異方殊俗歷學未能統一洪荒草昧史學未能完善亦一大原因也然茍無一定之説不足以起人之信仰宗教以得人信仰為妙用於前諸説孰是孰非將烏乎定之是誠一最有研究價值之問題也雖然佛既以循衆生之情示現生滅之迹今亦惟循衆生之情以人類最多數所信仰之説而定之耳佛教之流行以中國為最完全法琳法師既嘗考定周昭甲寅誕生周穆壬申示滅今復依琳師推定者開佛誕二千九百四十年紀念會於中華民國首善之區大多數人亦已奉之無異説則佛誕之紀年不定於是而又將誰定哉但古今歷數沿革實多震旦建正三代有異而西竺則以寅月十六為歲首寅月十五為歲終欲斷定佛生於何月何日蓋亦未易措辭也唯民間既以四月八日為佛誕節已成不可轉移之俗尚則非四月八日是定又復誰定哉顧茲者民國成立改用陽曆至陰曆四月八日陽曆已五月二十日也何適何從將誰是決須知民國之所以改用陽曆者乃迫於世界而不得不然者也中華民國既迫於世界之趨勢而不得不然則佛教亦處此趨勢之中而有不得不然者特陽曆改用伊始民間未能普及竊謂自今年以往當遵用陽曆四月八日為佛誕日而鄉曲僻壤未能遍知者不妨循用陰曆庶於世界之趨勢國民之風尚兩得允當此徵之日本有前事之可鑒者也嗚呼吾今為斯説吾知自是其是食古而不化者必將以吾説為大不韙然余亦無暇與之辨也當更進其論曰佛既應機示迹衆生之機感無常佛之示迹亦復不一故釋迦實成佛於無量無數劫前仍不礙於三阿僧祇中現比丘身現居士身現農工身現帝皇身現六欲天身現四禪天身現聲聞身現菩薩身乃至現龍神修羅身外道梵志身羽毛鱗甲身餓鬼地獄身及夫現丈六金身現千丈盧舍那身或示壽千劫萬劫或住壽剎那一念法華云三千大千世界無芥子許不是釋迦捨身命處即可知三千大千世界無處不是釋迦示生處即可知自有三千大千世界以來無年無月無日無時不是釋迦降誕示滅之期又安知今日之人類中無釋迦示現乎又安知今日之畜類中無釋迦之示現乎夫釋迦固常作是好夢而年年月月日日時時刻刻念念剎那剎那降生出家成道轉法輪入涅槃也吾人果欲紀念之乎則亦必日日時時刻刻念念紀念之乃可吾人果能刻刻念念為佛誕紀念則吾人方且念念皆佛念念即佛佛身充滿於虛空佛身亦充滿於吾人念念也佛身充滿於吾人念念間吾人之念念亦充滿於佛身念念乎佛身乎吾人乎心佛衆生三無差別盡法界皆成一大光明藏於是乎吾中華民國二年佛誕二千九百四十年四月八日燦爛莊嚴之紀念大會斯真成其為佛誕紀念會矣見佛教月報第二期
