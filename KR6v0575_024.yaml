body:
  text: 佛法之教理行果十二年七月在黃梅明倫堂講佛法非一時中所能盡述故今講佛法亦無從講起然諸君欲知佛法之妙亦不難譬如飲茶入口即知其味不飲則終不能知也但是知道有佛之法必先知有佛並知佛之所從來須知佛由人成非佛成人凡屬有覺性之物皆有佛性如萬物各有自性且依四大而言地性堅水性濕火性暖風性動而衆生之心皆覺為性故云一切衆生皆有佛性但我們祇有佛性而德相功用未嘗發揮倘能發揮出德相功用則無往而非佛也亦無往而非佛法也講到佛法不出教理行果之四所謂教者即三藏聖教也三藏者經律論是早此二千九百五十年時有釋迦牟尼世尊現身說法實因悲憫大地衆生迷惑自性而濟渡之也佛世唯有身教言教逮佛涅槃而後有三上首曰阿難迦葉優波離結集佛住世時所教所行之真理遂名曰經經之梵語名修多羅此經藏之所以由來也律之梵語毗奈耶所謂律者即調伏三業之規律也佛未示寂以先即有律法如行住坐臥聽法應供皆須遵守戒律論有二種或佛論或弟子之辨論佛論者佛住世時有九十六種外道邪見紛紜佛胥以理論之乃破諸外執如迦旃延先為外道後因佛申諸正論即皈內教佛弟子論者即舍利弗諸人及後世佛弟子之論也但佛弟子論須以佛之道德為根本考大藏經律論明代時有八千餘卷現存者未遑詳記我們現在知道自己有佛性及知三藏聖教之來因但所謂教者有二種差別一記録佛及聖衆所示現種種之事蹟二記録佛及聖衆所解說種種之言語括二種之記録示現事蹟為身教解說言語為言教然知有佛有教須先起信究而論之起信屬後明理為先理尚不解信何由起若不知理之所在即為盲動欲解此理可以二諦概括之所謂二諦者即勝義諦世俗諦勝義諦又名真諦或名第一義諦彰本寂之理所謂實際理地不受一塵是非雙泯能所俱亡指萬有為真如會三乘歸實際謂之第一義諦明緣起之事所謂佛事門中不捨一法如勸臣以忠勸子以孝弘善示天堂治惡顯地獄等謂之世俗諦此二諦中所包天地人物蘊處界等苦集滅道諸法若以真如實際言之則此妄有之萬物為俗諦不能通於勝義也所言蘊處界等蘊即五蘊處即十二處界即十八界等者等於七大之地水火風空見識等欲明此道理有俱舍論成唯識論諸君可研究之苦集滅道四法此二諦而言苦集道屬俗諦滅屬真諦耳苦以集為因集以苦有果集惑業而獲苦果依苦果而生惑業此乃人生流轉生死之因也道者有四念處四正勤四如意足五根五力七覺支八正道總之則為三十七道品欲離苦得樂出生死入涅槃當修此道也一真法界以二空為門二空即人空法空能證二空則通達一真法界蓋一真法界不可思議故云能證二空之真理則謂之一真法界也既知此教不將此理講明即知其然而不知其所以然與天仙鬼神等衆無分良莠此天仙鬼神亦輪回六道不能超出三界故必知其所以然方為了解真理前謂天地人物等在生死流行中欲知確實惟在理之明不明耳倘真信了教解了理必知修行的津梁但修行須以戒為首依三藏而言戒即律藏戒分五戒十戒乃至二百五十戒等其意義太繁且略而不詳所謂行者即三業之所行也三業者身口意是身不行殺盜淫口不行妄語惡口兩舌綺語意不行貪瞋癡此身三口四意三不行即十善反之即十惡也然善惡之發現皆由意三所主動身口七支則附從耳所謂一切惟心造也上面所言二諦真理謂天地萬物皆屬虛假就是人生於世不知死從何去生從何來大抵生死輪流實緣意之三毒根而起也上云貪瞋癡即三毒也貪心起時應以慈心伏之瞋心起時以悲心伏之癡心起時以般若之心伏之般若梵語華言智慧常存慈悲智慧之心則能種諸善行二六時中不離此善行即可以了生脫死而達到妙覺佛果之地位也覺慧記見海刊四卷十期附注原題在黃梅明倫堂之講演今改題
