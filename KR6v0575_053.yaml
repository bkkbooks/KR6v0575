body:
  text: 來廈門之感想十五年十月在廈門南普陀寺講太虛此次由星洲返滬經過廈門因南普陀為名勝之區地方信士亦多故抱參學的觀念來此今承各團體及佛界同胞聚集一堂得與勝會非常欣幸雖是無何可說但對之頓使發生三種感想今略提出與諸君一談一因地感想廈門於中國向謂之大廈國廈門即是大廈之門戶也現在中西交通中國有兩個大門戶一是廣東香港一是福建廈門而香港自開放以來為西方生存競爭物質文明輸入中國之大門戶雖未嘗不因之使生活豐富但中國鎗炮輪船火車及種種害人殺人之具亦無不由香港輸入使我東方民族受種種迫害得種種不安寧而痛苦的結果欲去除此種種不安寧之痛苦須將東方固有的最高尚最和平的道德文化從此廈門大門戶輸出照破西方的黑暗方奏神效然所以能如此者一為廈門大學新創設國學研究院一為南普陀寺已成立之閩南佛學院蓋近年來中國的少數學者漸窺得東方偉大性之文化如考古發見地下之古蹟或察先民之遺籍推驗到古代偉大民族之精神然欲重新發皇此精神以應現世之潮流而喚醒科學萬能之迷夢廈門大學之新建國學研究院應負此重大之責任且廈大為華僑所設易由南洋以及西洋也而南普陀之閩南佛學院為近時國內各佛學院中之比較良好者地方信士亦有從之研究者若能將此佛學精神發揚以漸達南洋則可普及世界故廈門為發揚中華國學提倡道德文化輸入西洋之大門戶也二因教感想南普陀寺是佛教機關今天來會者一部分是佛教徒其餘亦大都與佛教直接間接有因緣關係者然對於教之感想蓋有二說一是隨宜之教一是大乘之教這兩種性質自釋迦牟尼時已有之矣因地方民族希望不同隨宜施設所謂隨順衆生而為說法或設人天教理使作人天業果或設小乘解脫教理適應印度外道心理使進一步得證解脫若依真正無上正遍知者所證諸法實相之教理即大乘佛法此就佛教有兩種性質而言者在中華佛教經過六朝至隋唐時佛教大盛在學理思想多屬大乘然唐後一般信徒往往趨向小乘對於自己修證切實注意倡明佛法於社會則不關心士大夫信佛者多出晚年發心名利心消但求自身清淨依從佛法為歸宿而已其餘一般無學識者為求人天福報發心信佛在當時政治上確有使人改惡行善之重要關係而在佛教上不過一種人天因果而已以前兩種一為人天一為小乘皆非真正大乘佛法也現在廈門佛教非疇昔可比我覺得廈門佛教很有大乘的氣象許多青年學子組織佛教團體能作種種宣傳佛事又能兼行種種教育公益事務藉此宏揚大乘佛法出家徒衆除自行修證外參加宣揚宏化者亦復不少以此觀之廈門佛教不惟不是以上人天小乘之佛法實為真正大乘佛教之真精神也三因人感想佛說法的法會大衆自帝王以至苦力之種種人衆皆有且種種靈獸奇鳥及非人類等亦參與其會中國向來舊習以佛法但為出家人的其餘皆非佛法中人豈不謬甚原來佛法為一切大衆公有非出家獨有今天來會大衆非惟出家一部即士農工商男女老幼以及其他民族宗教之徒亦歡聚一堂以此推想當時佛說法時的大衆恍然復現於今日矣可見佛法已成社會化而將原有大乘佛法恢復如初足為佛法前途之光明也上來三種感想歸納言之東方道德文化必有復興之機會一面倡明佛理使人人了解真實意義然後將佛教大乘真義普及世界使佛化成社會化一面將佛法真正救世利人的事業實行做出近來中國內亂無歲無之戰爭相續兵匪相攘十五年來仍無休息之希望天災人禍慘之極矣故我們須一方面本佛慈悲濟世利人之心認為自己之責任將災區難民竭力救濟一方面將大乘佛法真理發揚光大普及社會使一般人民自心覺悟苦痛之根本從自心根本解決如此乃真為學佛之人也達如記見海刊七卷十一期附注原題在南普陀歡迎會講今改題
