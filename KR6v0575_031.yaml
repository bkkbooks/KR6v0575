body:
  text: 知識行為能力之三者能否一致十三年秋在武昌佛學院講驗其知識察其行為探其能力此三者一致與否然後是聖是凡可得而分矣一切有情或知識高超而行為不端或行為嚴肅而能力微弱或知行一致而無能力或行能俱美而乏智識人性之不同各如其面此亦無可奈何之差別也唯其性情不同故求學之趨亦異或遍重於知識或注意於行為或置心於能力所以希臘柏拉圖以世界一切人民分為三類一知識者即能為哲學之士不識謀生之術二保衛者即強勇護國之人而無幽玄理想之心三農工等者即有謀生之技而無正知之流雖然真正有志之士必須知行能三者成為一致始可顯其學問之成功不然縱有真確之知識而兼勇技之能力若無增勝之行為則不能利用其知能於善道反以此知能助其惡事滋其罪業此確知強能不如無也縱有端正知行相合一致若無實用之能力則成一種空談虛論於事何濟縱能行俱美若無正知則事理不明設有所為徒成迷信是以要有正知方有端行既有正知端行方顯能力古聖賢流美於萬古遺澤於千秋自可想其三者之一致也佛法大旨雖甚繁多亦此三者之一致而已何以言之以世所謂知行能即佛法中之境行果也真正之知識即是智慧故佛具大智慧方能了達諸境名無上正遍知也淨善之行為即是道德故佛依於正而修淨善名萬德具足也佛法既具無上正知圓成萬德自然而成美妙能力之果所謂以無畏力施設無量善巧方便化導眾生是也但世人多以才藝為天所賦所謂天才也佛法不然而以為新舊熏習所成例如吾人始生不成事理後由學習亦漸能之故有宿習之力則今世易學而能之無宿習之力則今世強學而能之是以知行能之三者由宿習成熟非天賦也故多學一次則多一次之熏習多一次熏習即多一次成熟知識高超行為完善能力具足三者一致之理豈容歧出乎故西洋言真善美謂此能知之心與所知之境如實相應謂之真又以此心調和物我自他無礙謂之善既有真知善行法爾而有美妙之能力孔子以智仁勇為三達德此心之明謂之智此心之公謂之仁此心之強謂之勇此三者相與一致方成達德佛法大日經云菩提心為因大悲為根本方便為究竟蓋菩提即覺此覺非菩薩之分覺乃佛究竟照了諸法澈底之大覺佛具此大覺而成同體大悲為萬行之根本廣度無邊有情佛既具此同體大悲而所起萬行皆為善巧方便隨順世出世間一切有情而行導化此佛法中一致之言也由此觀之則知行能三者凡人不能一致賢哲可能一致佛乃究竟完成一致也研究員會中記見海刊六卷五期
