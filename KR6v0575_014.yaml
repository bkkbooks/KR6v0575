body:
  text: 論佛法為救時之必要虛空無邊世界無量衆生無盡佛種種救濟世界衆生之方法的功力亦無邊無量無盡本不能指定一方域一時代以論之但應吾人所知之限量而起言説則今此交通所及之一人間十數萬萬人的五洲地面實為煩擾惱害困迫苦痛最劇烈之時若非以佛法救之則無論用何種方法其苦惱必將如水益深如火益熱而永無得救之日夫世間種種之宗教學説其理論及事行誰非求致自由平等之樂冀免強逼高壓之苦者何以皆不能救今此人世之厄而必佛法乃能救之也則正以種種之宗教學説學説包括哲學科學而言其理論皆唯物的因果論也物作一個東西解釋其事行皆敵戰的占取行也基督教以上帝那一個東西為因而生天地人物之多果固唯物的因果論也馬克斯學派以生産的那一個東西為因而生人群世變之多果亦唯物的因果論也唯物論家以若干原質或無數原子為因而生萬有之果固唯物之因果論也唯心論家以多人格心或一宇宙心為因而生萬有之果亦唯物的因果論也蓋彼所説的因及所説的果要皆認為一個一個的東西故耳夫一個東西之謂物既認為一個東西則不問其所指這個東西之性質德量如何而皆可歸之彼一物或多為因此一物或多物為果之唯物的因果論也存此理論於心而發為事行其必為一個一個東西由對敵戰鬥而求占據取有決無疑義科學家以征服自然而行動馬克斯派以煽令勞工仇敵資本家與戰爭而占取之為行動何莫非敵戰的占取行者出此數例可以概觀世間種種之教學皆唯物的因果論敵戰的占取行矣今世莽莽之禍亂皆發源於是唯佛法能除此迷謬故唯佛法能救之也所謂佛法可以唯識的緣成論與慈悲的善巧行概括之緣者有互相資助的關係而無獨個自有的實體之謂也明一切皆無個實而但有衆緣雖不無衆緣幻成的相用而非有獨個實在的體性是謂不無非有之中道的緣成義佛法是全説明此義者然此所云衆緣太為散漫欲令得其要以相契應故明唯識以衆緣雖恢詭莫可窮詰或即知識或即隨知識而起的情志或即知識情志所現的境相質是本識現的影是轉識現的或即知識情志境相的分位或即知識情志境相分位的無生滅無差別理性一切皆不離識故為唯識的緣成論也唯識的緣成論中都無一個一個的東西存在但有不離於識之互相資助的關係及此衆緣化成的假相幻用故敵對無從安立而戰鬥亦無從發生且亦畢竟無可占據取有者於是一切煩擾惱害罪惡苦痛皆根本消滅而唯存以衆樂為樂而普令得樂為慈與以衆苦為苦而普令離苦為悲所發為無數的善巧行善巧行亦曰方便行或折或攝或逆或順或奇或正或經或變唯化是適不居故常到此則雖世間種種的宗教哲學科學亦未始非藥籠中之妙藥矣善巧之行雖復無量要皆以普令離苦得樂為歸故為慈悲的善巧行也今云佛法為救時之要者以今此人世之所患無一非唯物的因果論與敵戰的占取行所致唯佛法有徹底療治之唯識的緣生論與慈悲的善巧行之妙藥故取佛法為救時之要鄭太朴記見海刊三卷九期
