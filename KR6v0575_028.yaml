body:
  text: 學佛初門由三法入在武昌佛教會講一信入信有信信解信行信未到解信行信須有信信為基信信之表示即受三皈是三皈者皈依佛法僧為師更不以其餘之天道魔道外道神道鬼道為師也二解入聞熏教義研思經論法界事理了解不惑三行入約之為二一自力入二共力入自力入多門約為觀心觀心多門約為反觀能思惟心何在為總要共力入多門約為念佛念佛多門約為專念阿彌陀佛名號為總要有信無解行則愚具之則為智信深信有解無信行則狂虛具之則為正解實解有行無信解則雜劣具之則為淨行勝行若具智信深信正解實解淨行勝行則入學佛初門否則終在佛門外繞不能入門見海刊五卷三期
