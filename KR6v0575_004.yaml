body:
  text: 我之佛教觀六年十月在台灣佛教講演會講一佛教與吾人之關係茫茫宇宙譬如一大逆旅吾人與萬物並生此逆旅之中要皆過客而已逆旅未至銷毀即過客不絕來往然逆旅依然存在悠悠千古一代一代之過客竟不知其何所歸往祇少數所謂帝王將相聖賢豪傑名士美人者稍稍留其痕跡供吾人之瀏覽憑弔嗟夫古人之跡在此古人之真何往耶雖然吾人自幼而壯自壯而老剽劫於無常急駛之流猶落花之墮湍水不容停駐數十年之光陰一瞥即逝又將有後來之過客以已往之客哀吾人矣嗟夫吾人自哀不暇尚奚暇為古人哀乎吾人在世度一日即趨近死限一日如牽赴屠場之豕步步行近死地生而不得不死死又不得不生隨業流轉生死無已夫生死之變亦大矣吾浪死虛生虛生浪死竟不能稍稍自覺稍稍自由可不哀乎不寧惟是即在有生之域數十年間其本心誰不欲勉為善行以邀天福親悟真理以成聖智達美滿優勝之地位獲常住周遍之安樂者故曰一切眾生皆具如來智慧德相顧牽攝於事勢顛倒於感倩馳逐於名利奔走於衣食又鮮不喪失其本心始誠實而卒流虛偽始高尚而終就苟且忘己而役乎物昧因而騖乎果甚乃習非勝是積妄成性亦何嘗稍稍能自由能自覺乎嗟夫吾人於此逆旅之宇宙既如盲人摸象曾不能一睹其真相即反之小己之志行亦不能自主自遂冥冥焉莫自知其所來倀倀焉莫自知其所往既無異乎禽獸之盲動又寧免草木以同腐乎嗟夫人為萬物之靈長人為有理性之動物人為有目的之動物其真意義果安在乎若竟不求吾人之真意義而安於禽獸之盲動草木之同腐則謂之心死之人哀莫大於心死身雖未死亦僅行尸走肉而所謂人者則早已失卻矣夫佛教者即救度吾人之本心而活之者也令人人發自心之智慧悟自心之常樂故吾人之自心即光明無量壽命無量之阿彌陀佛也令人人充自心之慈悲致自心之寧靜故吾人之自心即能仁寂默之釋迦牟尼佛也蓋吾人固非不能遍知遍覺自由自主者祇以未得無上真正之道安定其心志立定其性命故常為物欲所誘而生諸苦惱常為環境所惑而生諸妄想苦惱障礙妄想流轉是以不能證如來智慧德相夫吾人雖欲專一學欲精一義亦必心安志定而後能有所成就故曰道也者不可須臾離也可離非道也此宗教與吾人之關係所以甚深甚重更無第二事能與相等也然欲令吾人安信志之心定慧性之命必求佛教之無上真正之道非其餘人天之邪宗小教所致也而宗教者即皈依之義皈依者即皈向其心依止無上真正之道心與道一之謂無上真正之道即是佛教佛教即是佛法僧三寶佛是能覺悟開示無上真正之道之人佛法是佛覺悟開示之無上真正之道佛法僧是信解行證無上真正之道之人三寶之德不可言量吾人在茫茫苦海中三寶為舟航漫漫黑夜中三寶為明燈悠悠險道中三寶為導師冥冥曠野中三寶為真宅舉要言之三寶是吾人第一可依恃者第一可崇拜者亦是第一能覺悟吾人者能救護吾人者故吾人凡有心知靈覺者皆有佛性皆是佛子皆應了解無上真正之佛道信仰無上真正之佛教皈依三寶以為安身立命之地從之於哲理上轉迷成悟於倫理上轉惡成善於身心上轉苦成樂於世界上轉凡成聖也令更從宗教上哲學上科學上倫理上政治上教育上等種種方面與佛教皆比較而分別觀察令知究竟唯一佛教為無上真正之道故吾人皆應信解受持也二宗教上之佛教觀甲分別觀宗教上之緣起三一人人皆有離苦惱而得安樂免死亡而獲常存轉濁惡而成淨善了諸法而明真性之本懷二眾生自無始以來有二種障一無明障二煩惱障吾人既有前之本懷復為二障所障不能通達遂生妄見而執妄法三有釋迦牟尼佛大覺聖人出世斷除二障得遂本懷本其身之所崇教示吾人以三界惟心萬法惟識一切法因緣生之一實相印印定諸法令吾人了悟無常苦空無我得達其常樂我淨之目的遂有心佛眾生三無差別之佛教唯一正教起宗教上之要素五一曰信仰他教有三一如信有天神上帝為宇宙唯一真宰等二如信世界萬物皆天上唯一帝主所造等三如信善惡苦樂罪福唯由上帝命令所支配等佛教亦有三一實體佛信一切法唯心心真如覺性即佛二德相法信一切法因緣生諸法實相不可思議三能用僧信因果不昧緣起無盡十方三世利益有情二曰心神心神之界說者他教則為鬼神如世俗傳說人之形軀死亡後其心魂精魄或為鬼為神之類天神如婆羅門教耶穌教天主教回回教等不悟即心自性之真如體用謂為天上之唯一真性等靈魂婆羅門教於三世輪迴執靈魂說耶穌教於人心死後執靈魂說佛教則為心性萬物唯心心本覺性即如來藏妙真如性心神之理論者他教之有神者三多神則拜動物拜山川草木拜門堂井灶等一神則祠天主祠上帝祠大梵天祠摩醯首羅天神汎則以現存之萬有皆神觀宇宙之閎渺悠久生寅畏心於宇宙之真體生渴慕心等皆謂之汎神教無神者如虛無斷滅論等佛教則宇宙惟心物我無性直指人心見性成佛三曰因果因果無謬罪福不亡固宗教實踐上一重要義他教或有現在而無過未或有過未而無現在或有現在未來而無過去或雖三世而偏執一端不識因果之真相唯佛能圓滿證說三世之理四曰慈悲凡宗教各有慈悲救世度人之義粗觀之孔之仁墨之兼愛耶之博愛似與佛之慈悲無別然細密察之佛教之慈悲有生緣慈悲法緣慈悲無緣慈悲之三種他教唯有生緣慈悲之小部耳五曰教主凡宗教必有現實世界上人格最偉大之教主佛教以釋迦牟尼佛為教主釋迦牟尼佛為五洲萬國有歷史以來第一偉大人物其降生尊貴之族帝王之子其出家壯盛之年富樂之人其修道六年苦行成最正覺其救世轉大法輪度無量眾故曰天上天下無如佛十方世界亦無比世間所有我盡見一切無有如佛者乙圓融觀上來依分別門觀之佛教如大海他教如斷港佛教如赫日他教如爝火佛教如雪嶽他教如土阜顯然有其淺深勝劣高下之異昔雅典大哲亞里陀大德曰吾雖甚愛吾師柏拉圖然不如吾愛真理今吾於各教教主教義亦如是雖汎然莫不尊愛而一經與佛教比較則真相所存彰明較著不容為各教曲掩雖然佛教不特其尊無上抑其大無外也無外則無對絕待無待絕對則離一切相即一切法而若邪若正若小若大若偏若圓無不融歸佛心矣茲更作一圖表示如下佛法界者眾生心是宗極一心教示萬法法法絕待唯是一心心心圓融遍含萬法夫是之謂佛教牟尼現世天人之師軌範行業迺宣教戒教戒未足發智故聞義學以窮理義學未足證心故修靜慮以體真靜慮未足悟物故廣為無量方便法門以濟眾夫至廣為無量方便法門以濟眾則群眾所傳誦持續之道術又寧有不可融歸乎佛法者哉即如耶教崇拜宇宙唯一天主佛亦稱三千大千世界主又耶教謂上帝創造世界蓋出於婆羅門教崇祀大梵天者之說佛亦嘗自稱我即大婆羅門及大梵天耶教不設形像此亦佛教中之一種無相法門金剛經所謂若見諸相非相即見如來是也舉此犖犖數端餘可類推而知矣要之宗教者貴乎上得其真下能益民益民之道貴乎律儀清正心行慈善耶教上得其真與否雖不敢知然能勤修乎利益生民之業未離人天之行異乎回教之多近修羅法及其餘教淫教殺教盜諸不律儀教以牛戒自餓投灰諸苦行外道近於畜生餓鬼地獄者其盛行乎世宜矣雖然地藏常居地獄觀音現身餓鬼釋迦嘗為種種畜生以行菩薩道則三惡趣法亦何嘗非佛法乎是故種種外教之法入佛法中皆成佛法但除其執法本圓融所謂千流萬派無辭讓始見歸墟佛海深三哲學上之佛教觀另見四種種相之佛教觀余初列題本於哲學上之佛教觀後尚有科學上之佛教觀倫理上之佛教觀心理上之佛教觀政治上之佛教觀吾人崇信佛教之必要七篇今以時間短促故建立人心之三德性顯示佛法大意演繹十種三法門以渾括說明之文字實智自性一人心之三性德般若觀照解脫方便法身受用實相真性變化聞攝善法凡夫二佛教之三聖學慧思戒攝眾生定聖人修攝律儀如來轉迷成悟轉惡成善轉苦成樂三三轉法輪初轉二轉三轉轉妄成真轉染成淨轉凡成聖人佛四三不二門心物不二之實體因果不二之定理依正不二之法界生佛科學法理政治五人群之要素學術德行政教哲學倫理宗教六科學之三心理知識感情意志七人性之三同好真善美八中庸之三達德智仁勇九學校之三育智德體十國家之三權立法司法行政更一心三德圖示如下出東瀛采真錄附註原文無題今依意加
