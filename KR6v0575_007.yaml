body:
  text: 中國人口頭上心頭上的阿彌陀佛我中國有眼耳口鼻心思的人沒有一個不知道阿彌陀佛的也沒有一個不曾念過幾聲阿彌陀佛的那二萬萬的婦女們至少也有一萬萬的人常念著阿彌陀佛更不消說得的了照這樣看起來這一句阿彌陀佛豈不是我們中國的人連著眼耳口鼻心思同有的一件東西麼我們既然每日同這阿彌陀佛在一起這阿彌陀佛到底是個什麼道理又豈不可考究考究麼前幾年有一位學校裏做教員的朋友那日遇著了我突然向我道到處看見老太婆們口裡喃喃的念著南無阿彌陀佛恐怕這些老太婆們未必能懂得念這南無阿彌陀佛是什麼意思罷我當時答他道這一句阿彌陀佛原是不很容易懂得的不曾讀書識字明理的老太婆口裡喃喃念著心裏不知道這阿彌陀佛是什麼道理為什麼念這阿彌陀佛又何足為奇呢即在一般號稱讀書明理的人又有幾個能懂得呢足下若知道時這南無阿彌陀佛六字到底是什麼道理念這阿彌陀佛到底是什麼意思到要請教請教了那知這位先生竟找不出一句回答的話便低著頭赸赸的去了我看同這位先生一般的人恐還不少呢有的說南無阿彌陀佛是說這個佛單是西方有的我們南方是沒有的意思有的說阿彌陀佛是人人堂上的阿母是寺院裡的大佛合攏來便是阿母大佛把音聲稍微讀別又接著把字寫錯了遂成了個阿彌陀佛我有時也曾去問問那念佛的老太婆們你為什麼要念這阿彌陀佛念了這阿彌陀佛有何用處他便回答道念一句阿彌陀佛是死後做鬼時可當一個錢用的我們為著死後要錢用所以念佛的這種影響模糊的解說他們也未嘗不以為有來有歷很有道理但未免與南無阿彌陀佛的道理念阿彌陀佛的意思相去的太遠了有人說你道沒有人不念過幾聲阿彌陀佛這話恐不對罷中國人口裡頭念佛的雖多也不過齋公齋婆罷了我答他道這是因為你沒有在我們中國人心頭上口頭上極平常的時節細細體察體察所以不大覺得倘能夠細細體察不但能夠覺到個個都是念過幾聲阿彌陀佛的人而且阿彌陀佛的道理念阿彌陀佛的意思也就能夠見到幾分呢有的時候聽見或看見人家殺豬啦殺羊啦殺強盜啦殺雞殺鴨啦殺得怪兇怕的打賊啦打丫頭啦打養媳婦啦打小孩子啦打得怪悽慘的罵天啦罵家裡人啦罵親眷鄰舍啦罵得怪刻毒的又見那種種勞苦窮急的人勞碌辛苦到了不得的時候餓煞凍煞的時候家敗人亡的時候投河上吊走頭沒路的時候救又救弗得勸又勸弗信心中一陣難受墮著灑下幾點同情淚便不知不覺口裡念著阿彌陀佛南無阿彌陀佛這一種景況大概在有點天良的人十有八九是經過了的就此可見這阿彌陀佛是慈悲的道理念這阿彌陀佛是惻隱的意思了有的時候遇著了大水啦大火啦兵勇啦強盜啦種種的急難遭著了官司啦牢獄啦種種的橫禍又有那身體病痛啦家產傾敗啦親愛的生離死別啦怨憎的對頭會面啦種種的苦惱兜到心上來躲不脫的時候心裏頭便自然不歇氣的默念著阿彌陀佛南無阿彌陀佛這豈不是拿阿彌陀佛來當做一個能夠救苦救難的人念阿彌陀佛就是懇求他救度的意思嗎有的時候看見或聽見十惡五逆沒有法子奈何他的惡人遭報應死了又看見或聽見那指天畫地賭咒罰誓慣冤枉人圖賴人的人這一天忽然統統宣露了出來當場受萬人唾罵又有時見自己的冤家對頭的人死了或吃了苦心裏頭一爽快又喜又懼亦往往把一句阿彌陀佛信口念出這豈不是把阿彌陀佛當做因果報應念這阿彌陀佛就是常常記著因果報應不敢為非作歹的意思麼又有那羨慕別人家富貴榮耀有福氣的或者受了人家極重的恩惠自覺今生不能報答的便也不知不覺在心裏頭口裡頭念著阿彌陀佛豈非阿彌陀佛是個福最大恩最深的人所以念著阿彌陀佛求福報恩嗎又有那一般普通社會的人與那些吃洋教的人學堂裡的學生滑頭滑腦油口油腔的人逢著了和尚啦尼姑啦齋公齋婆啦朝山進香誦經拜懺的善男信女啦便口中稱著阿彌陀佛以代招呼或為調笑戲弄或者如叫化子等有所求乞無論出於何種總是認阿彌陀佛是佛教的符號稱念阿彌陀佛是表示佛教的意思了照上面所說的種種事情看起來慈悲惻隱是阿彌陀佛所以念阿彌陀佛救苦救難是阿彌陀佛所以念阿彌陀佛因果報應是阿彌陀佛所以念阿彌陀佛錫福施恩是阿彌陀佛所以念阿彌陀佛佛教的符號是阿彌陀佛為表示是佛教所以念阿彌陀佛豈不是個個人皆念過幾聲阿彌陀佛的麼豈不是阿彌陀佛的道理念阿彌陀佛的意思就此也便可以明白了幾分麼但是這阿彌陀佛真正的道理念這阿彌陀佛真正的意思究竟還是沒有明白呢我們中國的人既然個個已經同阿彌陀佛結了深不可解的緣豈可不快快明白明白他麼若要明白聽我慢慢道來南無阿彌陀佛是一句天竺國裡的說話變成我們中國話南無就是恭敬皈依信仰服從阿彌陀就是沒有邊際的智光與沒有限量的福壽佛就是聖人神人天人全人至人有道德的人覺悟了的人智慧才能最偉大的人等合起來就是敬從那無邊無量智光福壽的聖人這阿彌陀佛不是我們這個世界裏頭的我們這個世界喚做忍苦的世界在二千九百多年前有一尊釋迦牟尼佛出現在我們這個世界為我們說了阿彌陀佛與那個極樂世界的歷史狀況我們遂知道阿彌陀佛在未成佛未有極樂世界以前的時候本是一個皇帝當時也有佛住世這皇帝極其信崇後來也從佛出家作了僧人修行不久便成了羅漢重發大菩薩心立願要在將來由他及同著他發願修行的人修成一個極樂世界思衣得衣思食得食想到那裏便到那裏想有什麼便有什麼一切的安寧快樂無不完備一切的危險苦惱無不離脫同住的人統是好人既無惡人亦無惡事自然駸駸乎日進於善直至成佛更無退轉既修成了這個極樂世界復要將此極樂世界的名字十方世界無不聞知使聞知者皆生欣慕但念阿彌陀佛的名號便可於轉生的時候由阿彌陀佛前來接引生到極樂世界裏頭去到後來果然成了個極樂世界這世界在我們這世界的西邊成佛名阿彌陀與許多的菩薩羅漢同住其中常常說法聚會時時到十方苦惱的世界去接引救度眾生使他們生到極樂世界裡頭去那釋迦牟尼佛因為見我們這個世界是極其苦惱的住在裡頭又是極其危險的因為雖做了個人能活幾年是沒有一定的一口氣不來便死了就在活的時候病啦老啦冷啦熱啦種種說不盡的苦痛圍繞著身心無法離脫所以教我們個個人心裏頭口裏頭常常念著阿彌陀佛使我們到了臨終轉世的時候便可由阿彌陀佛救度到極樂世界去永遠享安寧快樂更沒有一點兒危險苦惱這才是念阿彌陀佛真正的意思了這南無阿彌陀佛的道理念阿彌陀佛的意思既然完全明白了而且我們中國的人先天上已經有了這個阿彌陀佛念佛的工夫是很容易做的大家能時常的念阿彌陀佛便可與阿彌陀佛的心願互相感應猶如無線電機一般自然常常有超出世間的志量不致埋沒在這個忍苦的世界中了有的人說如此說來這念阿彌陀佛實在是件很有意思的事情我也想時常念阿彌陀佛了但是我們為人在世未免都有家庭的社會的國家的關係不能就拋棄了去當和尚這又如何是好呢我答他道你這又錯了當和尚是一件事念阿彌陀佛是一件事做事不做事是一個問題念佛不念佛是一個問題都是各不相關的所以念佛與在世做事毫不相妨且一念佛便能使世間的人做世間的事更做的好了何故呢因為這阿彌陀佛就是慈悲惻隱故就是救苦救難故就是因果報應故就是修福報恩故所以有父母的不能孝養必不能念阿彌陀佛能念阿彌陀佛必能孝養父母有子女的不能慈育必不能念阿彌陀佛能念阿彌陀佛必能慈育子女乃至為國民辦事的不能忠其所事必不能念阿彌陀佛能念阿彌陀佛必能忠其所事所以我們中國人只要把心頭上口頭上本來有的阿彌陀佛時時提醒著自然不愁不一日日的好起來單行本
